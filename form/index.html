<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Komana / Yeşilırmak river valley Archaeological Survey</title>
<style>
  /* ── TOKENS ───────────────────────────────────────── */
  :root {
    --bg:        #f4f1eb;
    --surface:   #ffffff;
    --border:    #d6d0c4;
    --accent:    #967f39;
    --accent-lt: #f5f0e0;
    --text:      #1a1a1a;
    --muted:     #7a7060;
    --danger:    #c0392b;
    --node-bg:   #f4f2e9;
    --node-border:#e6be21;
    --radius:    10px;
    --font:      'DM Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── HEADER ───────────────────────────────────────── */
  header {
    background: var(--accent);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1.1rem; letter-spacing: .08em; text-transform: uppercase; }

  /* ── TABS ─────────────────────────────────────────── */
  #tab-bar {
    display: flex;
    gap: 0;
    overflow-x: auto;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 0 12px;
  }
  .tab-btn {
    flex-shrink: 0;
    padding: 12px 18px;
    font-family: var(--font);
    font-size: .8rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    color: var(--muted);
    transition: color .15s, border-color .15s;
    margin-bottom: -2px;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── MAIN CONTENT ─────────────────────────────────── */
  main { padding: 20px 16px; max-width: 680px; margin: auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── FORM ─────────────────────────────────────────── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .form-card h2 {
    font-size: .75rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .field-group {
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .field-group label {
    font-size: .75rem;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%;
    padding: 10px 12px;
    font-family: var(--font);
    font-size: .95rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .field-group input:focus,
  .field-group select:focus { border-color: var(--accent); }

  /* checkbox row */
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
  }
  .checkbox-row input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* GPS field */
  .gps-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .gps-row input { flex: 1; min-width: 0; }
  .gps-btn {
    flex-shrink: 0;
    padding: 10px 14px;
    background: var(--accent-lt);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-family: var(--font);
    font-size: .8rem;
    color: var(--accent);
    cursor: pointer;
    white-space: nowrap;
  }
  .gps-btn:active { background: var(--accent); color: #fff; }

  /* ── LOCKED ID FIELD ──────────────────────────────── */
  .id-row {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg);
  }
  .id-prefix {
    display: flex;
    align-items: center;
    padding: 10px 10px;
    background: var(--accent-lt);
    color: var(--accent);
    font-size: .9rem;
    white-space: nowrap;
    border-right: 1px solid var(--border);
    user-select: none;
  }
  .id-num {
    border: none !important;
    border-radius: 0 !important;
    background: var(--surface) !important;
    flex: 1;
    text-align: left;
    letter-spacing: .12em;
  }
  .id-hint { font-size: .68rem; color: var(--muted); font-style: italic; }

  /* ── CLICKER (tally counter) ──────────────────────── */
  .clicker-row { display: flex; align-items: stretch; gap: 8px; }
  .clicker-btn {
    flex-shrink: 0;
    width: 48px;
    font-size: 1.3rem;
    line-height: 1;
    background: var(--accent-lt);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font);
  }
  .clicker-btn:active { background: var(--accent); color: #fff; }
  .clicker-input { text-align: center; font-size: 1.1rem !important; }

  /* ── MULTI-SELECT (checkbox box) ──────────────────── */
  .multiselect-box {
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    max-height: 220px;
    overflow-y: auto;
  }
  .ms-opt {
    display: flex !important;
    align-items: center;
    gap: 9px;
    font-size: .85rem !important;
    text-transform: none !important;
    letter-spacing: 0 !important;
    color: var(--text) !important;
    padding: 4px 2px;
    cursor: pointer;
  }
  .ms-opt input { width: 17px; height: 17px; accent-color: var(--accent); flex-shrink: 0; }

  /* ── DATETIME MULTI ───────────────────────────────── */
  .dtm-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .dtm-row input { flex: 1; }

  /* buttons */
  .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .btn {
    padding: 12px 20px;
    font-family: var(--font);
    font-size: .8rem;
    letter-spacing: .07em;
    text-transform: uppercase;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn:active { opacity: .75; }
  .btn-primary { background: var(--accent); color: #fff; flex: 1; min-width: 150px; }
  .btn-export  { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
  .btn-clear   { background: var(--bg); border: 1px solid var(--danger);  color: var(--danger); }
  .editing-banner {
    display: none;
    background: var(--accent-lt);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: .78rem;
    margin-bottom: 12px;
  }

  /* ── NODE SECTION ─────────────────────────────────── */
  .node-section {
    border: 1.5px solid var(--node-border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 14px;
    background: var(--node-bg);
  }
  .node-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .node-header h3 {
    font-size: .72rem;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--node-border);
  }
  .node-count {
    font-size: .7rem;
    color: var(--muted);
    font-style: italic;
  }
  .node-list { margin-bottom: 10px; }
  .node-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: .82rem;
    line-height: 1.5;
  }
  .node-item-text { flex: 1; color: var(--text); }
  .node-item-text strong { color: var(--muted); font-weight: normal; }
  .node-remove {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 1rem;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    opacity: .7;
  }
  .node-remove:hover { opacity: 1; }
  .node-subform {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 12px 8px;
  }
  .node-subform .field-group { margin-bottom: 10px; }
  .node-subform .field-group label { color: var(--muted); }
  .node-subform .field-group input,
  .node-subform .field-group select {
    background: var(--node-bg);
    font-size: .88rem;
    padding: 8px 10px;
  }
  .node-add-btn {
    margin-top: 4px;
    padding: 8px 16px;
    font-family: var(--font);
    font-size: .75rem;
    letter-spacing: .07em;
    text-transform: uppercase;
    background: var(--node-border);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .node-add-btn:active { opacity: .75; }
  .node-hint {
    font-size: .72rem;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }
  .field-hint {
    font-size: .68rem;
    color: var(--muted);
    font-style: italic;
  }
  /* stop mini-headers */
  .stop-header {
    font-size: .72rem;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: bold;
    margin: 16px 0 8px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--accent-lt);
  }
  .node-branch {
    border-left: 2px solid var(--node-border);
    padding-left: 10px;
    margin: 8px 0;
  }

  /* ── ENTRIES TABLE ────────────────────────────────── */
  .entries-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .entries-card h2 {
    font-size: .75rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .entries-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  th {
    text-align: left;
    padding: 8px 12px;
    background: var(--bg);
    color: var(--muted);
    font-size: .7rem;
    letter-spacing: .07em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  td {
    padding: 9px 12px;
    border-top: 1px solid var(--border);
    vertical-align: top;
    max-width: 160px;
    word-break: break-word;
  }
  tr:nth-child(even) td { background: var(--bg); }
  .empty-msg { padding: 20px 16px; color: var(--muted); font-size: .85rem; }
  .node-cell {
    font-size: .75rem;
    color: var(--node-border);
    white-space: nowrap;
  }
  .actions-cell { white-space: nowrap; }
  .row-btn {
    font-family: var(--font);
    font-size: .7rem;
    padding: 5px 9px;
    border-radius: 5px;
    cursor: pointer;
    margin-right: 4px;
  }
  .row-edit { background: var(--accent-lt); border: 1px solid var(--accent); color: var(--accent); }
  .row-del  { background: var(--bg); border: 1px solid var(--danger); color: var(--danger); }

  /* photo field */
  .photo-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .photo-btn {
    flex-shrink: 0;
    padding: 10px 14px;
    background: var(--accent-lt);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-family: var(--font);
    font-size: .8rem;
    color: var(--accent);
    cursor: pointer;
    white-space: nowrap;
  }
  .photo-btn:active { background: var(--accent); color: #fff; }
  .photo-filename {
    font-size: .75rem;
    color: var(--muted);
    word-break: break-all;
  }
  .photo-preview {
    margin-top: 8px;
    max-width: 100%;
    max-height: 220px;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: block;
  }
</style>
</head>
<body>

<header>
  <h1>Komana / Yeşilırmak River Valley Archaeological Survey</h1>
  <span id="entry-count" style="font-size:.8rem;opacity:.8"></span>
</header>

<div id="tab-bar"></div>
<main id="main"></main>

<script>
// ═══════════════════════════════════════════════════════
//  DATA MODELS
// ═══════════════════════════════════════════════════════
const AUTHORS = ["D. Burcu Erciyas", "Maxime Durocher", "Bora Bakrıyanık", 
"Özgen Sütcü", "Selin Çergel", "Kat Erciyas", "Ezgi Sevimli", "Chiara Tedesco", 
"Pierre Benoit", "Yunus Emre Karasu", "Catherine Theresa Keane"];

// Building-material vocabulary (used in counters / hints)
const BUILDING_MATERIALS = [
  "Water pipe", "Roof tile", "Brick", "Cut stone", "Rubble / Fieldstone",
  "Mortar", "Plaster", "Marble", "Terracotta"
];

const HISTORICAL_PERIODS = [
  "Modern", "Ottoman", "Medieval (Islamic, 12th–15th)", "Byzantine", "Roman",
  "Hellenistic", "Iron Age", "Bronze Age", "Chalcolithic"
];

const SITE_TYPES = [
  "Settlement Site", "Burial / Funerary Site", "Production / Industrial Site",
  "Religious / Cultic Site", "Fortified / Defensive Site",
  "Infrastructure / Civic Site", "Specialized / Ritual or Symbolic Site"
];

// Build the 5 stop counters (each stop: Ceramics + Building materials)
// Each stop gets a mini-header showing its distance along the transect.
const STOP_FIELDS = [];
for (let s = 1; s <= 5; s++) {
  STOP_FIELDS.push({ name: `Stop ${s} — ${s * 10} m`,        type: "header" });
  STOP_FIELDS.push({ name: `Stop ${s} – Ceramics`,          type: "clicker" });
  STOP_FIELDS.push({ name: `Stop ${s} – Building materials`, type: "clicker" });
}

const MODELS = {

  "Survey Unit": [
    { name: "Author",                       type: "dropdown", options: AUTHORS },
    { name: "Date (creation of the entry)", type: "datetime" },
    { name: "Date of survey",               type: "datetime-multi",
      hint: "Add one date per survey season carried out on this unit." },
    // Only the 000 is editable — prefix is locked.
    { name: "Entry ID",                     type: "id", prefix: "KARP-S26-CMG-SU" },
    { name: "Administrative unit",          type: "dropdown",
      options: ["to be defined"] },
    { name: "Dimensions",                   type: "text", placeholder: "Length × width" },
    { name: "Coordinates (x / y / z)",      type: "gps" },
    { name: "Type of Survey Unit",          type: "dropdown",
      options: ["Modern field", "Hillslope", "Forest"] },
    { name: "Type of landscape",            type: "dropdown",
      options: ["Valley bottom", "Plain", "Plateau", "Ridge", "Hillslope", "Gorge", "Terrace", "Depression"] },
    { name: "Type of soil",                 type: "dropdown",
      options: ["Clay", "Silt", "Sand", "Loam", "Stony / Rocky", "Ploughed Topsoil", "Highly Eroded"] },
    { name: "Surface information",          type: "dropdown",
      options: ["Cultivated", "Untouched", "Plowed"] },
    { name: "Vegetation",                   type: "text" },
    { name: "Visibility (%)",               type: "percent",
      hint: "Grid to refine on site — e.g. 100 = freshly laboured · 80 = wheat recently cut · 30–40 = forest." },
    { name: "Survey methodology",           type: "dropdown",
      options: ["Intensive", "Extensive"] },
    { name: "Includes the transects",       type: "text", placeholder: "Transect ID names" },
    { name: "Units adjacent",               type: "text" },
    { name: "Type of site",                 type: "dropdown", options: SITE_TYPES },
    { name: "Historical coverage",          type: "multiselect", options: HISTORICAL_PERIODS },
    { name: "Finds / Architectural features / Epigraphy", type: "text",
      placeholder: "Links to find/architecture entries (added later)" },
    { name: "Related landscape unit",       type: "text" },
    { name: "Comments / Description",       type: "text" },
    { name: "Photographs",                  type: "photo" },
  ],

  "Transect": [
    { name: "Author / Fieldwalker",   type: "dropdown", options: AUTHORS },
    { name: "Date",                   type: "datetime" },
    // Entry ID typed by hand: fixed stem, you edit the SU number and the TR number.
    { name: "Entry ID",               type: "id-dual", stem: "KARP-S26-CMG-SU", mid: "-TR" },
    { name: "Survey unit",            type: "text", placeholder: "Parent survey unit ID" },
    { name: "Dimensions",             type: "text", placeholder: "Length (width assumed 1 m)" },
    { name: "Coordinates (start / end)", type: "gps2" },
    { name: "Adjacent transects",     type: "text", placeholder: "ID names of adjacent transects" },

    // ── STOP COUNTS (clickers) ────────────────────────
    ...STOP_FIELDS,

    { name: "Finds – Ceramics TOTAL COUNT",       type: "number" },
    { name: "Finds – Ceramics DIAGNOSTICS TOTAL", type: "number" },
    { name: "Description, observations",          type: "text" },
    { name: "Architectural features?",            type: "checkbox" },
    { name: "Other finds",                        type: "multiselect",
      options: ["Coins", "Slags", "Chipped stones"] },
    { name: "Finds (collected)",                  type: "text",
      placeholder: "Cross-reference to collected-find entries (added later)" },

    // ── ARCHITECTURAL FEATURES NODE (new model) ───────
    // Record on field first, complete later. Entry ID inherits the
    // transect's parent Survey unit (SU000) + an editable -ARCH number.
    { name: "Architectural Features", type: "node",
      hint: "Add one entry per architectural feature. Record on field first, complete later.",
      nodeFields: [
        { name: "Author", type: "dropdown", options: AUTHORS },
        { name: "Date", type: "datetime" },
        { name: "Entry ID", type: "id-arch", mid: "-ARCH" },
        { name: "Coordinates", type: "gps" },
        { name: "Orientation", type: "text" },
        { name: "Type of building", type: "dropdown",
          options: ["Unidentified", "Church", "Mosque", "Baths", "House"] },
        { name: "Type of feature(s) found", type: "multiselect",
          options: [
            "Column", "Capital", "Wall (standing)", "Pavement / Floor",
            "Arch / Vault", "Doorway / Threshold", "Window / Niche",
            "Mosaic", "Fresco / Wall painting", "Foundation"
          ]},
        { name: "Dimensions", type: "text", placeholder: "Height × width × thickness" },
        { name: "Materials", type: "multiselect",
          options: ["Limestone", "Marble", "Bricks"] },
        { name: "Epigraphy?", type: "checkbox" },
        { name: "Related finds", type: "text", placeholder: "Linked find IDs / commentary" },
        { name: "Observations", type: "text" },
        { name: "Link to parent transect / survey unit", type: "text" },
      ]
    },

    // ── EPIGRAPHIC MATERIAL NODE (kept separately) ────
    { name: "Epigraphic Material", type: "node",
      hint: "Add one entry per inscription.",
      nodeFields: [
        { name: "ID Number", type: "text" },
        { name: "Type", type: "dropdown", options: [
            "Funerary inscription", "Building inscription", "Votive inscription",
            "Honorary inscription", "Boundary marker", "Graffiti",
            "Fragment (unidentified)"
        ]},
        { name: "Language of the inscription", type: "dropdown", options: [
            "Turkish", "Greek (Ancient, Koine, Byzantine)", "Latin", "Phrygian", "Armenian (Classical)",
            "Thracian / Dacian (fragmentary)", "Phoenician / Punic", "Aramaic", "Hebrew (Ancient / Biblical)",
            "Arabic (Early Islamic, Kufic)", "Hittite", "Luwian / Hieroglyphic Luwian",
            "Lycian / Carian / Pisidian", "Urartian", "Georgian (Old Asomtavruli)", "Old Persian (Cuneiform)",
            "Elamite", "Sumerian", "Etruscan"
        ]},
        { name: "Writing Surface", type: "dropdown", options: [
            "marble", "limestone", "basalt / andesite", "sandstone", "stone",
            "bronze", "lead", "gold / silver", "clay", "ceramics", "terracotta",
            "wood / wax", "papyrus / parchment", "composite"
        ]},
        { name: "Shape", type: "dropdown", options: [
            "Rectangular / Square", "Circular / Disk-shaped", "Oval / Elliptical", "Triangular",
            "Polygonal / Multisided", "Globular (amphora, pithos)", "Conical (cups / small jars)",
            "Biconical", "Carinated (sharp-angled body)", "Columnar / Pillar-like",
            "Slab-like (flat plates, plaques)", "Domed / Vaulted", "Zoomorphic (animal-shaped)",
            "Anthropomorphic (human-shaped)", "Symbolic (cross, star, rosette)"
        ]},
        { name: "Coordinates", type: "gps" },
        { name: "Dimensions", type: "text" },
        { name: "Materials", type: "text" },
        { name: "Techniques", type: "dropdown", options: [
            "Relief carving (bas-relief, high-relief)", "Incised carving (linear engravings)",
            "Point chiseling / Pick dressing", "Polished finishing / Surface smoothing",
            "Rock-cut carving (architectural or inscriptions)", "Whittling / Linear carving",
            "Chip carving (geometric patterns)", "Engraving (fine incised lines)",
            "Punch-dot or Stipple engraving", "Scrimshaw-like fine carving",
            "Openwork / Pierced carving", "Incised decoration (pre-firing)",
            "Stamp-impressed decoration", "Barbotine / Applied relief decoration",
            "Inlayed carving (stone or metal inlays)"
        ]},
        { name: "Observations", type: "text" },
        { name: "Photo", type: "photo" },
      ],
    },
  ],

  "Landscape Character Area Base Profile": [
    { name: "Author / Fieldwalker",   type: "dropdown", options: AUTHORS },
    { name: "Date (First Creation of the Entry)",                   type: "datetime" },
    // Entry ID typed by hand: fixed stem, you edit the SU number and the TR number.
    { name: "Entry ID",               type: "id-dual", stem: "KARP-S26-CMG-LU"},
    { name: "Related Administrative Unit",            type: "text", placeholder: "Parent AU ID" },
    { name: "Related Survey Unit",            type: "text", placeholder: "Parent SU ID" },
    { name: "Area Definition",             type: "text", placeholder: "--" },
    { name: "Coordinates (start / end)", type: "gps2" },
    { name: "Place — Natural", type: "header" },

// ═══════════════════════════════════════════════════════
const pendingPhotos = {};

function photoKey(modelName, fieldIndex) { return `${modelName}::${fieldIndex}`; }

function onPhotoSelected(modelName, fieldIndex, inputEl) {
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;

  const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop() : 'jpg';
  const stamp = new Date().toISOString().replace(/[:.]/g, '-');
  const generatedName = `${slugify(modelName)}_${stamp}.${ext}`;

  pendingPhotos[photoKey(modelName, fieldIndex)] = generatedName;

  const filenameEl = document.getElementById(`photo-filename-${slugify(modelName)}-${fieldIndex}`);
  if (filenameEl) filenameEl.textContent = generatedName;

  const previewEl = document.getElementById(`photo-preview-${slugify(modelName)}-${fieldIndex}`);
  if (previewEl) {
    const reader = new FileReader();
    reader.onload = e => { previewEl.src = e.target.result; previewEl.style.display = 'block'; };
    reader.readAsDataURL(file);
  }

  const btn = document.getElementById(`photo-btn-${slugify(modelName)}-${fieldIndex}`);
  if (btn) btn.textContent = '📷 Retake photo';

  const a = document.createElement('a');
  a.href = URL.createObjectURL(file);
  a.download = generatedName;
  a.click();
  URL.revokeObjectURL(a.href);
}

//  SLUGIFY
// ═══════════════════════════════════════════════════════
function slugify(name) {
  return String(name).replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');
}
function escAttr(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }


// ═══════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════
const storageKey = name => `fieldform_${name}`;

function loadEntries(modelName) {
  try { return JSON.parse(localStorage.getItem(storageKey(modelName))) || []; }
  catch { return []; }
}
function saveEntries(modelName, entries) {
  localStorage.setItem(storageKey(modelName), JSON.stringify(entries));
}

const tabBar = document.getElementById('tab-bar');

function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', models[i] === name));
  document.querySelectorAll('.tab-panel').forEach(p =>
    p.classList.toggle('active', p.id === `panel-${slugify(name)}`));
  refreshParentDropdowns();
  updateCount();
}

// ── FIELD BUILDER ─────────────────────────────────────
function buildField(field, modelName, i) {
  const slug = slugify(modelName);
  const id = `field-${slug}-${i}`;
  const label = `<label for="${id}">${field.name}</label>`;
  const hint = field.hint ? `<span class="field-hint">${field.hint}</span>` : '';
  const ph = field.placeholder || field.name;

  switch (field.type) {
    case 'header':
      return `<div class="stop-header">${field.name}</div>`;
    case 'text':
      return `<div class="field-group">${label}<input id="${id}" type="text" placeholder="${ph}">${hint}</div>`;
    case 'number':
      return `<div class="field-group">${label}<input id="${id}" type="number" placeholder="0">${hint}</div>`;
    case 'percent':
      return `<div class="field-group">${label}<input id="${id}" type="number" min="0" max="100" step="1" placeholder="0–100">${hint}</div>`;
    case 'datetime':
      return `<div class="field-group">${label}<input id="${id}" type="datetime-local">${hint}</div>`;
    case 'datetime-multi':
      return `<div class="field-group">${label}
        <div id="${id}-rows">${dtmRowHTML('')}</div>
        <button type="button" class="node-add-btn" onclick="addDtmRow('${id}')">＋ Add date</button>
        ${hint}</div>`;
    case 'year':
      return `<div class="field-group">${label}<input id="${id}" type="number" min="1000" max="2100" placeholder="YYYY">${hint}</div>`;
    case 'url':
      return `<div class="field-group">${label}<input id="${id}" type="url" placeholder="https://">${hint}</div>`;
    case 'dropdown': {
      const opts = field.options.map(o => `<option value="${o}">${o}</option>`).join('');
      return `<div class="field-group">${label}<select id="${id}"><option value="">— select —</option>${opts}</select>${hint}</div>`;
    }
    case 'multiselect': {
      const opts = field.options.map(o =>
        `<label class="ms-opt"><input type="checkbox" value="${o}"> ${o}</label>`).join('');
      return `<div class="field-group">${label}<div class="multiselect-box" id="${id}">${opts}</div>${hint}</div>`;
    }
    case 'checkbox':
      return `<div class="field-group"><label>${field.name}</label>
        <label class="checkbox-row"><input id="${id}" type="checkbox"> Yes</label>${hint}</div>`;
    case 'clicker':
      return `<div class="field-group">${label}
        <div class="clicker-row">
          <button type="button" class="clicker-btn" onclick="bump('${id}',-1)">−</button>
          <input id="${id}" class="clicker-input" type="number" inputmode="numeric" min="0" value="0">
          <button type="button" class="clicker-btn" onclick="bump('${id}',1)">＋</button>
        </div>${hint}</div>`;
    case 'id': {
      return `<div class="field-group">${label}
        <div class="id-row">
          <span class="id-prefix">${field.prefix}</span>
          <input id="${id}-num" class="id-num" type="text" inputmode="numeric" value="000" maxlength="6">
        </div>
        <span class="id-hint">Only the number is editable — the rest is fixed.</span>${hint}</div>`;
    }
    case 'id-child': {
      return `<div class="field-group">${label}
        <div class="id-row">
          <span class="id-prefix" id="${id}-prefix">— select a survey unit —</span>
          <span class="id-prefix" style="background:var(--bg)">${field.mid}</span>
          <input id="${id}-num" class="id-num" type="text" inputmode="numeric" value="000" maxlength="6">
        </div>
        <span class="id-hint">The survey-unit part is inherited; you edit only the transect number.</span>${hint}</div>`;
    }
    case 'id-dual': {
      return `<div class="field-group">${label}
        <div class="id-row">
          <span class="id-prefix">${field.stem}</span>
          <input id="${id}-su" class="id-num" type="text" inputmode="numeric" value="000" maxlength="6"
            oninput="onTransectSUChange('${escAttr(modelName)}')">
          <span class="id-prefix" style="background:var(--bg)">${field.mid}</span>
          <input id="${id}-tr" class="id-num" type="text" inputmode="numeric" value="000" maxlength="6">
        </div>
        <span class="id-hint">Stem is fixed — type the SU number and the transect number by hand.</span>${hint}</div>`;
    }
    case 'parent-dropdown':
      return `<div class="field-group">${label}
        <select id="${id}" onchange="onParentChange('${escAttr(modelName)}', ${i})">
          <option value="">— select —</option>
        </select>${hint}</div>`;
    case 'gps':
      return `<div class="field-group">${label}
        <div class="gps-row">
          <input id="${id}-x" type="text" placeholder="x (lat)">
          <input id="${id}-y" type="text" placeholder="y (lon)">
          <input id="${id}-z" type="text" placeholder="z (alt)">
          <button type="button" class="gps-btn" id="gps-btn-${slug}-${i}" onclick="getGPS('${escAttr(modelName)}', ${i})">📍 Get</button>
        </div>${hint}</div>`;
    case 'gps2':
      return `<div class="field-group">${label}
        <div class="gps-row">
          <input id="${id}-s-lat" type="text" placeholder="Start lat">
          <input id="${id}-s-lon" type="text" placeholder="Start lon">
          <button type="button" class="gps-btn" id="gps-btn-${slug}-${i}-s" onclick="getGPS2('${escAttr(modelName)}', ${i}, 's')">📍 Start</button>
        </div>
        <div class="gps-row">
          <input id="${id}-e-lat" type="text" placeholder="End lat">
          <input id="${id}-e-lon" type="text" placeholder="End lon">
          <button type="button" class="gps-btn" id="gps-btn-${slug}-${i}-e" onclick="getGPS2('${escAttr(modelName)}', ${i}, 'e')">📍 End</button>
        </div>${hint}</div>`;
    case 'node':
      return buildNodeField(field, modelName, i);
    case 'photo':
      return `<div class="field-group">${label}
        <div class="photo-row">
          <input id="${id}" type="file" accept="image/*" capture="environment" style="display:none"
            onchange="onPhotoSelected('${escAttr(modelName)}', ${i}, this)">
          <button type="button" class="photo-btn" id="photo-btn-${slug}-${i}"
            onclick="document.getElementById('${id}').click()">📷 Take a photo</button>
          <span class="photo-filename" id="photo-filename-${slug}-${i}"></span>
        </div>
        <img class="photo-preview" id="photo-preview-${slug}-${i}" style="display:none">
      </div>`;
    default:
      return `<div class="field-group">${label}<input id="${id}" type="text">${hint}</div>`;
  }
}

// datetime-multi row markup
function dtmRowHTML(value) {
  return `<div class="dtm-row">
    <input type="datetime-local" class="dtm-input" value="${value || ''}">
    <button type="button" class="node-remove" onclick="this.parentNode.remove()">✕</button>
  </div>`;
}
function addDtmRow(boxId, value) {
  const rows = document.getElementById(`${boxId}-rows`);
  if (rows) rows.insertAdjacentHTML('beforeend', dtmRowHTML(value || ''));
}

// clicker increment/decrement
function bump(id, delta) {
  const el = document.getElementById(id);
  if (!el) return;
  let v = parseInt(el.value || '0', 10);
  if (isNaN(v)) v = 0;
  v += delta;
  if (v < 0) v = 0;
  el.value = v;
}


// ── PARENT DROPDOWN (inherit survey-unit ID) ──────────
function refreshParentDropdowns() {
  models.forEach(modelName => {
    MODELS[modelName].forEach((field, i) => {
      if (field.type !== 'parent-dropdown') return;
      const el = document.getElementById(`field-${slugify(modelName)}-${i}`);
      if (!el) return;
      const current = el.value;
      const sourceEntries = loadEntries(field.sourceModel);
      const ids = sourceEntries.map(e => e['Entry ID']).filter(Boolean);
      el.innerHTML = `<option value="">— select —</option>` +
        ids.map(id => `<option value="${id}">${id}</option>`).join('');
      if (ids.includes(current)) el.value = current;
    });
  });
}

function onParentChange(modelName, parentFieldIndex) {
  const slug = slugify(modelName);
  const parentVal = (document.getElementById(`field-${slug}-${parentFieldIndex}`) || {}).value || '';
  const parentName = MODELS[modelName][parentFieldIndex].name;
  // update any id-child whose parentField points here
  MODELS[modelName].forEach((field, i) => {
    if (field.type === 'id-child' && field.parentField === parentName) {
      const prefixEl = document.getElementById(`field-${slug}-${i}-prefix`);
      if (prefixEl) prefixEl.textContent = parentVal || '— select a survey unit —';
    }
    // update id-arch prefixes inside node sub-forms (they inherit the same parent)
    if (field.type === 'node') {
      field.nodeFields.forEach((sf, si) => {
        if (sf.type === 'id-arch') {
          const pe = document.getElementById(`node-field-${slug}-${i}-${si}-prefix`);
          if (pe) pe.textContent = parentVal || '— select survey unit (in Transect) —';
        }
      });
    }
  });
}

// Return the current parent Survey-unit ID for this model.
// Derived from the manually-typed SU number in the dual Entry ID, or a parent dropdown.
function getParentSUValue(modelName) {
  const slug = slugify(modelName);
  const fields = MODELS[modelName];
  for (let i = 0; i < fields.length; i++) {
    if (fields[i].type === 'id-dual') {
      const suEl = document.getElementById(`field-${slug}-${i}-su`);
      const num = suEl ? suEl.value.trim() : '';
      return num ? `${fields[i].stem}${num}` : '';
    }
    if (fields[i].type === 'parent-dropdown') {
      const el = document.getElementById(`field-${slug}-${i}`);
      return el ? el.value : '';
    }
  }
  return '';
}

// When the SU number in the Transect Entry ID changes, update ARCH id prefixes.
function onTransectSUChange(modelName) {
  const slug = slugify(modelName);
  const su = getParentSUValue(modelName);
  MODELS[modelName].forEach((field, i) => {
    if (field.type !== 'node') return;
    field.nodeFields.forEach((sf, si) => {
      if (sf.type === 'id-arch') {
        const pe = document.getElementById(`node-field-${slug}-${i}-${si}-prefix`);
        if (pe) pe.textContent = su || '— enter SU number above —';
      }
    });
  });
}


// ── NODE FIELD BUILDER ────────────────────────────────
function buildNodeField(field, modelName, fieldIndex) {
  setNodeItems(modelName, field.name, []);
  const slug = slugify(modelName);

  const subHtml = field.nodeFields.map((sf, si) =>
    buildSubField(sf, modelName, fieldIndex, si)
  ).join('');

  const hint = field.hint ? `<p class="node-hint">${field.hint}</p>` : '';

  return `
    <div class="node-section">
      <div class="node-header">
        <h3>${field.name}</h3>
        <span class="node-count" id="node-count-${slug}-${fieldIndex}">none added</span>
      </div>
      <div class="node-list" id="node-list-${slug}-${fieldIndex}"></div>
      <div class="node-subform">
        ${subHtml}
        <button class="node-add-btn" onclick="addNodeItem('${escAttr(modelName)}', ${fieldIndex})">＋ Add</button>
      </div>
      ${hint}
    </div>`;
}

function buildSubField(sf, modelName, fieldIndex, si) {
  const slug = slugify(modelName);
  const id  = `node-field-${slug}-${fieldIndex}-${si}`;
  const lbl = `<label for="${id}">${sf.name}</label>`;

  if (sf.type === 'dropdown') {
    const onChange = sf.triggers
      ? ` onchange="onNodeFieldChange('${escAttr(modelName)}', ${fieldIndex}, ${si}, this.value)"`
      : '';
    const opts = sf.options.map(o => `<option value="${o}">${o}</option>`).join('');
    return `<div class="field-group">${lbl}<select id="${id}"${onChange}><option value="">— select —</option>${opts}</select></div>`;
  }
  if (sf.type === 'dependent-dropdown') {
    return `<div class="field-group">${lbl}
      <select id="${id}" disabled style="opacity:.5">
        <option value="">— select a category first —</option>
      </select></div>`;
  }
  if (sf.type === 'branch') {
    return buildBranchBlock(sf, modelName, fieldIndex, si);
  }
  if (sf.type === 'datetime') return `<div class="field-group">${lbl}<input id="${id}" type="datetime-local"></div>`;
  if (sf.type === 'multiselect') {
    const opts = sf.options.map(o => `<label class="ms-opt"><input type="checkbox" value="${o}"> ${o}</label>`).join('');
    return `<div class="field-group">${lbl}<div class="multiselect-box" id="${id}">${opts}</div></div>`;
  }
  if (sf.type === 'id-arch') {
    return `<div class="field-group">${lbl}
      <div class="id-row">
        <span class="id-prefix" id="${id}-prefix">— select survey unit (in Transect) —</span>
        <span class="id-prefix" style="background:var(--bg)">${sf.mid}</span>
        <input id="${id}-num" class="id-num" type="text" inputmode="numeric" value="000" maxlength="6">
      </div>
      <span class="id-hint">SU part inherited from the transect's Survey unit; edit only the number.</span></div>`;
  }
  if (sf.type === 'number') return `<div class="field-group">${lbl}<input id="${id}" type="number" placeholder="0"></div>`;
  if (sf.type === 'year')   return `<div class="field-group">${lbl}<input id="${id}" type="number" min="1000" max="2100" placeholder="YYYY"></div>`;
  if (sf.type === 'url')    return `<div class="field-group">${lbl}<input id="${id}" type="url" placeholder="https://"></div>`;
  if (sf.type === 'gps') {
    return `<div class="field-group">${lbl}
      <div class="gps-row">
        <input id="${id}-x" type="text" placeholder="x (lat)">
        <input id="${id}-y" type="text" placeholder="y (lon)">
        <input id="${id}-z" type="text" placeholder="z (alt)">
        <button type="button" class="gps-btn" onclick="getNodeGPS('${id}')">📍 Get</button>
      </div></div>`;
  }
  if (sf.type === 'checkbox') {
    return `<div class="field-group"><label>${sf.name}</label>
      <label class="checkbox-row"><input id="${id}" type="checkbox"> Yes</label></div>`;
  }
  if (sf.type === 'photo') {
    return `<div class="field-group">${lbl}
      <div class="photo-row">
        <input id="${id}" type="file" accept="image/*" capture="environment" style="display:none"
          onchange="onNodePhotoSelected('${escAttr(modelName)}', ${fieldIndex}, ${si}, this)">
        <button type="button" class="photo-btn" id="${id}-btn"
          onclick="document.getElementById('${id}').click()">📷 Take a photo</button>
        <span class="photo-filename" id="${id}-filename"></span>
      </div>
      <img class="photo-preview" id="${id}-preview" style="display:none">
    </div>`;
  }
  return `<div class="field-group">${lbl}<input id="${id}" type="text" placeholder="${sf.name}"></div>`;
}

// ── BRANCH SUB-FIELDS ──
function buildBranchBlock(branchField, modelName, fieldIndex, si) {
  const slug = slugify(modelName);
  const blocksHtml = Object.entries(branchField.branches).map(([branchValue, branchFields]) => {
    const fieldsHtml = branchFields.map((bf, bi) =>
      buildBranchSubField(bf, modelName, fieldIndex, si, branchValue, bi)
    ).join('');
    return `<div class="node-branch" id="node-branch-${slug}-${fieldIndex}-${si}-${slugify(branchValue)}" style="display:none">${fieldsHtml}</div>`;
  }).join('');
  return blocksHtml;
}

function buildBranchSubField(bf, modelName, fieldIndex, si, branchValue, bi) {
  const slug = slugify(modelName);
  const id  = `node-branch-field-${slug}-${fieldIndex}-${si}-${slugify(branchValue)}-${bi}`;
  const lbl = `<label for="${id}">${bf.name}</label>`;

  if (bf.type === 'dropdown') {
    const opts = bf.options.map(o => `<option value="${o}">${o}</option>`).join('');
    return `<div class="field-group">${lbl}<select id="${id}"><option value="">— select —</option>${opts}</select></div>`;
  }
  if (bf.type === 'checkbox') {
    return `<div class="field-group"><label>${bf.name}</label>
      <label class="checkbox-row"><input id="${id}" type="checkbox"> Yes</label></div>`;
  }
  if (bf.type === 'gps') {
    return `<div class="field-group">${lbl}
      <div class="gps-row">
        <input id="${id}-x" type="text" placeholder="x (lat)">
        <input id="${id}-y" type="text" placeholder="y (lon)">
        <input id="${id}-z" type="text" placeholder="z (alt)">
        <button type="button" class="gps-btn" onclick="getNodeGPS('${id}')">📍 Get</button>
      </div></div>`;
  }
  if (bf.type === 'photo') {
    return `<div class="field-group">${lbl}
      <div class="photo-row">
        <input id="${id}" type="file" accept="image/*" capture="environment" style="display:none"
          onchange="onBranchPhotoSelected('${escAttr(modelName)}', ${fieldIndex}, '${escAttr(branchValue)}', ${bi}, this)">
        <button type="button" class="photo-btn" id="${id}-btn"
          onclick="document.getElementById('${id}').click()">📷 Take a photo</button>
        <span class="photo-filename" id="${id}-filename"></span>
      </div>
      <img class="photo-preview" id="${id}-preview" style="display:none">
    </div>`;
  }
  if (bf.type === 'number') return `<div class="field-group">${lbl}<input id="${id}" type="number" placeholder="0"></div>`;
  return `<div class="field-group">${lbl}<input id="${id}" type="text" placeholder="${bf.name}"></div>`;
}

// ── CASCADING DROPDOWN HANDLER ────────────────────────
function onNodeFieldChange(modelName, fieldIndex, triggerSubIndex, value) {
  const slug = slugify(modelName);
  const field = MODELS[modelName][fieldIndex];
  const triggerField = field.nodeFields[triggerSubIndex];

  field.nodeFields.forEach((sf, si) => {
    if (sf.type === 'dependent-dropdown' && sf.dependsOn === triggerField.name) {
      const el = document.getElementById(`node-field-${slug}-${fieldIndex}-${si}`);
      if (!el) return;
      const opts = (sf.optionsByValue[value] || []);
      el.innerHTML = opts.length
        ? `<option value="">— select —</option>` + opts.map(o => `<option value="${o}">${o}</option>`).join('')
        : `<option value="">— select a category first —</option>`;
      el.disabled = !opts.length;
      el.style.opacity = opts.length ? '1' : '.5';
    }
    if (sf.type === 'branch' && sf.dependsOn === triggerField.name) {
      Object.keys(sf.branches).forEach(branchValue => {
        const blockEl = document.getElementById(
          `node-branch-${slug}-${fieldIndex}-${si}-${slugify(branchValue)}`
        );
        if (blockEl) blockEl.style.display = (branchValue === value) ? 'block' : 'none';
      });
    }
  });
}


// ── ADD / REMOVE NODE ITEMS ───────────────────────────
function addNodeItem(modelName, fieldIndex) {
  const slug = slugify(modelName);
  const field = MODELS[modelName][fieldIndex];
  if (!field || field.type !== 'node') return;

  const item = {};

  field.nodeFields.forEach((sf, si) => {
    if (sf.type === 'branch') {
      Object.entries(sf.branches).forEach(([branchValue, branchFields]) => {
        const blockEl = document.getElementById(
          `node-branch-${slug}-${fieldIndex}-${si}-${slugify(branchValue)}`
        );
        const isVisible = blockEl && blockEl.style.display !== 'none';
        branchFields.forEach((bf, bi) => {
          const id = `node-branch-field-${slug}-${fieldIndex}-${si}-${slugify(branchValue)}-${bi}`;
          if (bf.type === 'photo') {
            const key = branchPhotoKey(modelName, fieldIndex, branchValue, bi);
            if (isVisible) item[bf.name] = pendingBranchPhotos[key] || '';
            delete pendingBranchPhotos[key];
            const fileInput = document.getElementById(id);
            if (fileInput) fileInput.value = '';
            const filenameEl = document.getElementById(`${id}-filename`);
            if (filenameEl) filenameEl.textContent = '';
            const previewEl = document.getElementById(`${id}-preview`);
            if (previewEl) { previewEl.style.display = 'none'; previewEl.src = ''; }
            const btn = document.getElementById(`${id}-btn`);
            if (btn) btn.textContent = '📷 Take a photo';
            return;
          }
          if (bf.type === 'gps') {
            const x = (document.getElementById(`${id}-x`) || {}).value || '';
            const y = (document.getElementById(`${id}-y`) || {}).value || '';
            const z = (document.getElementById(`${id}-z`) || {}).value || '';
            if (isVisible) item[bf.name] = (x || y || z) ? `${x},${y},${z}` : '';
            ['-x', '-y', '-z'].forEach(s => { const e = document.getElementById(`${id}${s}`); if (e) e.value = ''; });
            return;
          }
          const el = document.getElementById(id);
          if (!el) return;
          if (isVisible) {
            item[bf.name] = bf.type === 'checkbox' ? (el.checked ? 'yes' : 'no') : el.value.trim();
          }
          if (bf.type === 'checkbox') el.checked = false; else el.value = '';
        });
      });
      return;
    }

    if (sf.type === 'photo') {
      const key = nodePhotoKey(modelName, fieldIndex, si);
      item[sf.name] = pendingNodePhotos[key] || '';
      resetNodePhoto(modelName, fieldIndex, si);
      return;
    }

    if (sf.type === 'gps') {
      const id = `node-field-${slug}-${fieldIndex}-${si}`;
      const x = (document.getElementById(`${id}-x`) || {}).value || '';
      const y = (document.getElementById(`${id}-y`) || {}).value || '';
      const z = (document.getElementById(`${id}-z`) || {}).value || '';
      item[sf.name] = (x || y || z) ? `${x},${y},${z}` : '';
      ['-x', '-y', '-z'].forEach(s => { const e = document.getElementById(`${id}${s}`); if (e) e.value = ''; });
      return;
    }

    if (sf.type === 'id-arch') {
      const base = `node-field-${slug}-${fieldIndex}-${si}`;
      const parent = getParentSUValue(modelName);
      const num = (document.getElementById(`${base}-num`) || {}).value || '';
      item[sf.name] = parent ? `${parent}${sf.mid}${num}` : (num ? `${sf.mid}${num}` : '');
      const numEl = document.getElementById(`${base}-num`); if (numEl) numEl.value = '000';
      return;
    }

    if (sf.type === 'multiselect') {
      const box = document.getElementById(`node-field-${slug}-${fieldIndex}-${si}`);
      item[sf.name] = box ? Array.from(box.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value).join(', ') : '';
      if (box) box.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false);
      return;
    }

    const el = document.getElementById(`node-field-${slug}-${fieldIndex}-${si}`);
    if (!el) return;
    item[sf.name] = sf.type === 'checkbox' ? (el.checked ? 'yes' : 'no') : el.value.trim();
    if (sf.type === 'checkbox') el.checked = false; else el.value = '';
  });

  if (Object.values(item).every(v => !v || v === 'no')) return; // nothing filled

  const items = getNodeItems(modelName, field.name);
  items.push(item);
  setNodeItems(modelName, field.name, items);
  renderNodeList(modelName, fieldIndex, field);

  // hide all branch blocks again after submit
  field.nodeFields.forEach((sf, si) => {
    if (sf.type !== 'branch') return;
    Object.keys(sf.branches).forEach(branchValue => {
      const blockEl = document.getElementById(
        `node-branch-${slug}-${fieldIndex}-${si}-${slugify(branchValue)}`
      );
      if (blockEl) blockEl.style.display = 'none';
    });
  });
}

function removeNodeItem(modelName, fieldIndex, idx) {
  const field = MODELS[modelName][fieldIndex];
  const items = getNodeItems(modelName, field.name);
  items.splice(idx, 1);
  setNodeItems(modelName, field.name, items);
  renderNodeList(modelName, fieldIndex, field);
}

function renderNodeList(modelName, fieldIndex, field) {
  const slug = slugify(modelName);
  const items   = getNodeItems(modelName, field.name);
  const listEl  = document.getElementById(`node-list-${slug}-${fieldIndex}`);
  const countEl = document.getElementById(`node-count-${slug}-${fieldIndex}`);

  if (countEl) countEl.textContent = items.length ? `${items.length} added` : 'none added';
  if (!listEl) return;

  listEl.innerHTML = items.map((item, idx) => {
    const summary = Object.entries(item)
      .filter(([, v]) => v && v !== 'no')
      .map(([k, v]) => `<strong>${k}:</strong> ${v}`)
      .join('  ·  ');
    return `<div class="node-item">
      <span class="node-item-text">${summary || '(empty)'}</span>
      <button class="node-remove" title="Remove" onclick="removeNodeItem('${escAttr(modelName)}', ${fieldIndex}, ${idx})">✕</button>
    </div>`;
  }).join('');
}


// ── GPS ───────────────────────────────────────────────
function getGPS(modelName, fieldIndex) {
  const slug = slugify(modelName);
  const id  = `field-${slug}-${fieldIndex}`;
  const btn = document.getElementById(`gps-btn-${slug}-${fieldIndex}`);
  if (btn) btn.textContent = '…';
  navigator.geolocation.getCurrentPosition(
    pos => {
      document.getElementById(`${id}-x`).value = pos.coords.latitude.toFixed(6);
      document.getElementById(`${id}-y`).value = pos.coords.longitude.toFixed(6);
      const z = document.getElementById(`${id}-z`);
      if (z) z.value = (pos.coords.altitude != null) ? pos.coords.altitude.toFixed(1) : '';
      if (btn) btn.textContent = '✓';
    },
    err => { alert('GPS error: ' + err.message); if (btn) btn.textContent = '📍 Get'; },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function getGPS2(modelName, fieldIndex, which) {
  const slug = slugify(modelName);
  const id  = `field-${slug}-${fieldIndex}`;
  const btn = document.getElementById(`gps-btn-${slug}-${fieldIndex}-${which}`);
  const label = which === 's' ? '📍 Start' : '📍 End';
  if (btn) btn.textContent = '…';
  navigator.geolocation.getCurrentPosition(
    pos => {
      document.getElementById(`${id}-${which}-lat`).value = pos.coords.latitude.toFixed(6);
      document.getElementById(`${id}-${which}-lon`).value = pos.coords.longitude.toFixed(6);
      if (btn) btn.textContent = '✓';
    },
    err => { alert('GPS error: ' + err.message); if (btn) btn.textContent = label; },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function getNodeGPS(baseId) {
  navigator.geolocation.getCurrentPosition(
    pos => {
      const x = document.getElementById(`${baseId}-x`);
      const y = document.getElementById(`${baseId}-y`);
      const z = document.getElementById(`${baseId}-z`);
      if (x) x.value = pos.coords.latitude.toFixed(6);
      if (y) y.value = pos.coords.longitude.toFixed(6);
      if (z) z.value = (pos.coords.altitude != null) ? pos.coords.altitude.toFixed(1) : '';
    },
    err => alert('GPS error: ' + err.message),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}


// ── COLLECT ONE FIELD'S VALUE FROM THE FORM ───────────
function collectField(field, modelName, i) {
  const slug = slugify(modelName);
  const id = `field-${slug}-${i}`;
  switch (field.type) {
    case 'node':
      return getNodeItems(modelName, field.name);
    case 'photo':
      return pendingPhotos[photoKey(modelName, i)] || '';
    case 'checkbox':
      return document.getElementById(id).checked ? 'yes' : 'no';
    case 'multiselect': {
      const box = document.getElementById(id);
      if (!box) return '';
      return Array.from(box.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value).join(', ');
    }
    case 'datetime-multi': {
      const rows = document.getElementById(`${id}-rows`);
      if (!rows) return '';
      return Array.from(rows.querySelectorAll('.dtm-input')).map(inp => inp.value).filter(Boolean).join(' | ');
    }
    case 'id': {
      const num = (document.getElementById(`${id}-num`) || {}).value || '';
      return field.prefix + num;
    }
    case 'id-child': {
      const prefixEl = document.getElementById(`${id}-prefix`);
      const parent = prefixEl ? prefixEl.textContent.trim() : '';
      const num = (document.getElementById(`${id}-num`) || {}).value || '';
      const validParent = parent && !parent.startsWith('—') ? parent : '';
      return validParent ? `${validParent}${field.mid}${num}` : '';
    }
    case 'id-dual': {
      const su = (document.getElementById(`${id}-su`) || {}).value || '';
      const tr = (document.getElementById(`${id}-tr`) || {}).value || '';
      return `${field.stem}${su}${field.mid}${tr}`;
    }
    case 'gps': {
      const x = document.getElementById(`${id}-x`).value;
      const y = document.getElementById(`${id}-y`).value;
      const z = document.getElementById(`${id}-z`).value;
      return (x || y || z) ? `${x},${y},${z}` : '';
    }
    case 'gps2': {
      const sLat = document.getElementById(`${id}-s-lat`).value;
      const sLon = document.getElementById(`${id}-s-lon`).value;
      const eLat = document.getElementById(`${id}-e-lat`).value;
      const eLon = document.getElementById(`${id}-e-lon`).value;
      const hasS = sLat || sLon, hasE = eLat || eLon;
      if (!hasS && !hasE) return '';
      return `start:${sLat},${sLon} | end:${eLat},${eLon}`;
    }
    default:
      return document.getElementById(id).value.trim();
  }
}


// ── SUBMIT (add or update) ────────────────────────────
function submitEntry(modelName) {
  const fields = MODELS[modelName];
  const editing = editIndex[modelName];
  const entries = loadEntries(modelName);

  const entry = (editing != null && entries[editing])
    ? { ...entries[editing] }
    : { _timestamp: new Date().toISOString() };

  fields.forEach((field, i) => {
    if (field.type === 'header') return;
    entry[field.name] = collectField(field, modelName, i);
  });

  if (editing != null) {
    entry._edited = new Date().toISOString();
    entries[editing] = entry;
  } else {
    entries.push(entry);
  }
  saveEntries(modelName, entries);

  editIndex[modelName] = null;
  setEditUI(modelName, false);
  resetForm(modelName);
  renderTable(modelName);
  refreshParentDropdowns();   // new survey units become selectable in Transect
  updateCount();
}


// ── EDIT / DELETE ENTRIES ─────────────────────────────
function editEntry(modelName, idx) {
  const entry = loadEntries(modelName)[idx];
  if (!entry) return;
  editIndex[modelName] = idx;
  loadEntryIntoForm(modelName, entry);
  setEditUI(modelName, true, idx);
  switchTab(modelName);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit(modelName) {
  editIndex[modelName] = null;
  resetForm(modelName);
  setEditUI(modelName, false);
}

function deleteEntry(modelName, idx) {
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  const entries = loadEntries(modelName);
  entries.splice(idx, 1);
  saveEntries(modelName, entries);
  if (editIndex[modelName] === idx) cancelEdit(modelName);
  renderTable(modelName);
  refreshParentDropdowns();
  updateCount();
}

function setEditUI(modelName, on, idx) {
  const slug = slugify(modelName);
  const submitBtn = document.getElementById(`submit-btn-${slug}`);
  const cancelBtn = document.getElementById(`cancel-btn-${slug}`);
  const banner    = document.getElementById(`edit-banner-${slug}`);
  if (submitBtn) submitBtn.textContent = on ? '✓ Update entry' : '＋ Add entry';
  if (cancelBtn) cancelBtn.style.display = on ? '' : 'none';
  if (banner) {
    banner.style.display = on ? 'block' : 'none';
    banner.textContent = on ? `Editing entry #${idx + 1} — changes will overwrite it.` : '';
  }
}

// Populate the form with an existing entry's values
function loadEntryIntoForm(modelName, entry) {
  const slug = slugify(modelName);
  MODELS[modelName].forEach((field, i) => {
    const id = `field-${slug}-${i}`;
    const val = entry[field.name];

    switch (field.type) {
      case 'node': {
        setNodeItems(modelName, field.name, Array.isArray(val) ? val.map(o => ({ ...o })) : []);
        renderNodeList(modelName, i, field);
        break;
      }
      case 'photo': {
        pendingPhotos[photoKey(modelName, i)] = val || '';
        const fnEl = document.getElementById(`photo-filename-${slug}-${i}`);
        if (fnEl) fnEl.textContent = val || '';
        const btn = document.getElementById(`photo-btn-${slug}-${i}`);
        if (btn) btn.textContent = val ? '📷 Retake photo' : '📷 Take a photo';
        break;
      }
      case 'checkbox': {
        const el = document.getElementById(id);
        if (el) el.checked = (val === 'yes');
        break;
      }
      case 'multiselect': {
        const box = document.getElementById(id);
        if (box) {
          const chosen = String(val || '').split(',').map(s => s.trim());
          box.querySelectorAll('input[type=checkbox]').forEach(c => { c.checked = chosen.includes(c.value); });
        }
        break;
      }
      case 'datetime-multi': {
        const rows = document.getElementById(`${id}-rows`);
        if (rows) {
          rows.innerHTML = '';
          const vals = String(val || '').split('|').map(s => s.trim()).filter(Boolean);
          if (vals.length === 0) rows.insertAdjacentHTML('beforeend', dtmRowHTML(''));
          else vals.forEach(v => rows.insertAdjacentHTML('beforeend', dtmRowHTML(v)));
        }
        break;
      }
      case 'id': {
        const num = document.getElementById(`${id}-num`);
        if (num) num.value = String(val || '').replace(field.prefix, '') || '000';
        break;
      }
      case 'id-child': {
        // val looks like "<parentId>-TR000"
        const num = document.getElementById(`${id}-num`);
        const prefixEl = document.getElementById(`${id}-prefix`);
        const s = String(val || '');
        const sep = field.mid;
        const cut = s.lastIndexOf(sep);
        if (cut >= 0) {
          if (prefixEl) prefixEl.textContent = s.slice(0, cut) || '— select a survey unit —';
          if (num) num.value = s.slice(cut + sep.length) || '000';
        } else {
          if (num) num.value = '000';
        }
        break;
      }
      case 'id-dual': {
        // val looks like "KARP-S26-CMG-SU007-TR012"
        const suEl = document.getElementById(`${id}-su`);
        const trEl = document.getElementById(`${id}-tr`);
        let s = String(val || '');
        if (s.startsWith(field.stem)) s = s.slice(field.stem.length);
        const cut = s.lastIndexOf(field.mid);
        if (cut >= 0) {
          if (suEl) suEl.value = s.slice(0, cut) || '000';
          if (trEl) trEl.value = s.slice(cut + field.mid.length) || '000';
        } else {
          if (suEl) suEl.value = s || '000';
          if (trEl) trEl.value = '000';
        }
        break;
      }
      case 'parent-dropdown': {
        const el = document.getElementById(id);
        if (el) {
          // make sure the value is an available option
          if (val && !Array.from(el.options).some(o => o.value === val)) {
            el.insertAdjacentHTML('beforeend', `<option value="${val}">${val}</option>`);
          }
          el.value = val || '';
        }
        break;
      }
      case 'gps': {
        const parts = String(val || '').split(',');
        const x = document.getElementById(`${id}-x`), y = document.getElementById(`${id}-y`), z = document.getElementById(`${id}-z`);
        if (x) x.value = parts[0] || '';
        if (y) y.value = parts[1] || '';
        if (z) z.value = parts[2] || '';
        break;
      }
      case 'gps2': {
        const m = String(val || '').match(/start:([^,]*),([^|]*)\|\s*end:([^,]*),(.*)$/);
        const set = (sfx, v) => { const e = document.getElementById(`${id}-${sfx}`); if (e) e.value = (v || '').trim(); };
        if (m) { set('s-lat', m[1]); set('s-lon', m[2]); set('e-lat', m[3]); set('e-lon', m[4]); }
        else { set('s-lat',''); set('s-lon',''); set('e-lat',''); set('e-lon',''); }
        break;
      }
      default: {
        const el = document.getElementById(id);
        if (el) el.value = val != null ? val : '';
      }
    }
  });
  onTransectSUChange(modelName);   // sync any ARCH id prefixes to the loaded SU number
}


// ── RESET FORM ────────────────────────────────────────
function resetForm(modelName) {
  const slug = slugify(modelName);
  MODELS[modelName].forEach((field, i) => {
    const id = `field-${slug}-${i}`;
    if (field.type === 'node') {
      setNodeItems(modelName, field.name, []);
      renderNodeList(modelName, i, field);
      field.nodeFields.forEach((sf, si) => {
        if (sf.type === 'branch') {
          Object.entries(sf.branches).forEach(([branchValue, branchFields]) => {
            const blockEl = document.getElementById(`node-branch-${slug}-${i}-${si}-${slugify(branchValue)}`);
            if (blockEl) blockEl.style.display = 'none';
            branchFields.forEach((bf, bi) => {
              const bid = `node-branch-field-${slug}-${i}-${si}-${slugify(branchValue)}-${bi}`;
              if (bf.type === 'photo') {
                delete pendingBranchPhotos[branchPhotoKey(modelName, i, branchValue, bi)];
                const fileInput = document.getElementById(bid);
                if (fileInput) fileInput.value = '';
                const filenameEl = document.getElementById(`${bid}-filename`);
                if (filenameEl) filenameEl.textContent = '';
                const previewEl = document.getElementById(`${bid}-preview`);
                if (previewEl) { previewEl.style.display = 'none'; previewEl.src = ''; }
                const btn = document.getElementById(`${bid}-btn`);
                if (btn) btn.textContent = '📷 Take a photo';
                return;
              }
              if (bf.type === 'gps') {
                ['-x','-y','-z'].forEach(s => { const e = document.getElementById(`${bid}${s}`); if (e) e.value = ''; });
                return;
              }
              const bEl = document.getElementById(bid);
              if (!bEl) return;
              if (bf.type === 'checkbox') bEl.checked = false; else bEl.value = '';
            });
          });
          return;
        }
        if (sf.type === 'photo') { resetNodePhoto(modelName, i, si); return; }
        if (sf.type === 'gps') {
          const nid = `node-field-${slug}-${i}-${si}`;
          ['-x','-y','-z'].forEach(s => { const e = document.getElementById(`${nid}${s}`); if (e) e.value = ''; });
          return;
        }
        if (sf.type === 'id-arch') {
          const nid = `node-field-${slug}-${i}-${si}`;
          const numEl = document.getElementById(`${nid}-num`); if (numEl) numEl.value = '000';
          const pe = document.getElementById(`${nid}-prefix`);
          if (pe) pe.textContent = getParentSUValue(modelName) || '— select survey unit (in Transect) —';
          return;
        }
        if (sf.type === 'multiselect') {
          const box = document.getElementById(`node-field-${slug}-${i}-${si}`);
          if (box) box.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false);
          return;
        }
        const el = document.getElementById(`node-field-${slug}-${i}-${si}`);
        if (!el) return;
        if (sf.type === 'dependent-dropdown') {
          el.innerHTML = '<option value="">— select a category first —</option>';
          el.disabled = true; el.style.opacity = '.5';
        } else if (sf.type === 'checkbox') { el.checked = false; }
        else { el.value = ''; }
      });
    } else if (field.type === 'photo') {
      delete pendingPhotos[photoKey(modelName, i)];
      const fileInput = document.getElementById(id);
      if (fileInput) fileInput.value = '';
      const filenameEl = document.getElementById(`photo-filename-${slug}-${i}`);
      if (filenameEl) filenameEl.textContent = '';
      const previewEl = document.getElementById(`photo-preview-${slug}-${i}`);
      if (previewEl) { previewEl.style.display = 'none'; previewEl.src = ''; }
      const btn = document.getElementById(`photo-btn-${slug}-${i}`);
      if (btn) btn.textContent = '📷 Take a photo';
    } else if (field.type === 'checkbox') {
      const el = document.getElementById(id); if (el) el.checked = false;
    } else if (field.type === 'multiselect') {
      const box = document.getElementById(id);
      if (box) box.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false);
    } else if (field.type === 'datetime-multi') {
      const rows = document.getElementById(`${id}-rows`);
      if (rows) rows.innerHTML = dtmRowHTML('');
    } else if (field.type === 'clicker') {
      const el = document.getElementById(id); if (el) el.value = '0';
    } else if (field.type === 'id') {
      const num = document.getElementById(`${id}-num`); if (num) num.value = '000';
    } else if (field.type === 'id-child') {
      const num = document.getElementById(`${id}-num`); if (num) num.value = '000';
      const prefixEl = document.getElementById(`${id}-prefix`); if (prefixEl) prefixEl.textContent = '— select a survey unit —';
    } else if (field.type === 'id-dual') {
      const suEl = document.getElementById(`${id}-su`); if (suEl) suEl.value = '000';
      const trEl = document.getElementById(`${id}-tr`); if (trEl) trEl.value = '000';
    } else if (field.type === 'parent-dropdown') {
      const el = document.getElementById(id); if (el) el.value = '';
    } else if (field.type === 'gps') {
      ['-x','-y','-z'].forEach(s => { const e = document.getElementById(`${id}${s}`); if (e) e.value = ''; });
      const btn = document.getElementById(`gps-btn-${slug}-${i}`); if (btn) btn.textContent = '📍 Get';
    } else if (field.type === 'gps2') {
      ['-s-lat','-s-lon','-e-lat','-e-lon'].forEach(s => { const e = document.getElementById(`${id}${s}`); if (e) e.value = ''; });
      const bs = document.getElementById(`gps-btn-${slug}-${i}-s`); if (bs) bs.textContent = '📍 Start';
      const be = document.getElementById(`gps-btn-${slug}-${i}-e`); if (be) be.textContent = '📍 End';
    } else {
      const el = document.getElementById(id); if (el) el.value = '';
    }
  });
}


// ── RENDER TABLE ──────────────────────────────────────
function fmtCell(field, v) {
  if (v == null || v === '') return '';
  if (field && field.type === 'node') {
    const n = Array.isArray(v) ? v.length : 0;
    return n ? `◈ ${n} item${n > 1 ? 's' : ''}` : '—';
  }
  return v;
}

function renderTable(modelName) {
  const slug = slugify(modelName);
  const entries   = loadEntries(modelName);
  const container = document.getElementById(`table-${slug}`);
  if (!container) return;

  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-msg">No entries yet.</div>';
    return;
  }

  const fieldByName = {};
  MODELS[modelName].forEach(f => fieldByName[f.name] = f);
  const headers = ['_timestamp', ...MODELS[modelName].filter(f => f.type !== 'header').map(f => f.name)];
  const headerRow = `<th>Actions</th>` + headers.map(h => `<th>${h}</th>`).join('');

  const rows = entries.map((e, idx) =>
    `<tr>
      <td class="actions-cell">
        <button class="row-btn row-edit" onclick="editEntry('${escAttr(modelName)}', ${idx})">Edit</button>
        <button class="row-btn row-del" onclick="deleteEntry('${escAttr(modelName)}', ${idx})">✕</button>
      </td>
      ${headers.map(h => {
        const f = fieldByName[h];
        if (f && f.type === 'node') {
          const v = e[h]; const n = Array.isArray(v) ? v.length : 0;
          return `<td class="node-cell">${n ? `◈ ${n} item${n > 1 ? 's' : ''}` : '—'}</td>`;
        }
        return `<td>${fmtCell(f, e[h])}</td>`;
      }).join('')}
    </tr>`
  ).join('');

  container.innerHTML = `<table><thead><tr>${headerRow}</tr></thead><tbody>${rows}</tbody></table>`;
}


// ── EXPORT CSV ────────────────────────────────────────
function exportCSV(modelName) {
  const entries = loadEntries(modelName);
  if (entries.length === 0) { alert('No entries to export.'); return; }

  const headers  = ['_timestamp', ...MODELS[modelName].filter(f => f.type !== 'header').map(f => f.name)];
  const escape   = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
  const cellVal  = (h, e) => {
    const v = e[h];
    return Array.isArray(v) ? escape(JSON.stringify(v)) : escape(v);
  };
  const lines = [
    headers.map(escape).join(','),
    ...entries.map(e => headers.map(h => cellVal(h, e)).join(','))
  ];

  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${modelName.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}


// ── CLEAR ALL ─────────────────────────────────────────
function clearEntries(modelName) {
  if (!confirm(`Delete ALL entries for "${modelName}"? This cannot be undone.`)) return;
  localStorage.removeItem(storageKey(modelName));
  cancelEdit(modelName);
  renderTable(modelName);
  refreshParentDropdowns();
  updateCount();
}


// ── HEADER COUNT ──────────────────────────────────────
function updateCount() {
  const entries = loadEntries(activeTab);
  document.getElementById('entry-count').textContent =
    entries.length ? `${entries.length} entr${entries.length > 1 ? 'ies' : 'y'}` : '';
}
