<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Komana / Yeşilırmak river valley Archaeological Survey</title>
<style>
  /* ── TOKENS ───────────────────────────────────────── */
  :root {
    --bg:        #f4f1eb;
    --surface:   #ffffff;
    --border:    #d6d0c4;
    --accent:    #967f39;
    --accent-lt: #f5f0e0;
    --text:      #1a1a1a;
    --muted:     #7a7060;
    --danger:    #c0392b;
    --node-bg:   #f4f2e9;
    --node-border:#e6be21;
    --radius:    10px;
    --font:      'DM Mono', 'Courier New', monospace;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }
 
  /* ── HEADER ───────────────────────────────────────── */
  header {
    background: var(--accent);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1.1rem; letter-spacing: .08em; text-transform: uppercase; }
 
  /* ── TABS ─────────────────────────────────────────── */
  #tab-bar {
    display: flex;
    gap: 0;
    overflow-x: auto;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 0 12px;
  }
  .tab-btn {
    flex-shrink: 0;
    padding: 12px 18px;
    font-family: var(--font);
    font-size: .8rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    color: var(--muted);
    transition: color .15s, border-color .15s;
    margin-bottom: -2px;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
 
  /* ── MAIN CONTENT ─────────────────────────────────── */
  main { padding: 20px 16px; max-width: 680px; margin: auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
 
  /* ── FORM ─────────────────────────────────────────── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .form-card h2 {
    font-size: .75rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
 
  .field-group {
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .field-group label {
    font-size: .75rem;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%;
    padding: 10px 12px;
    font-family: var(--font);
    font-size: .95rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .field-group input:focus,
  .field-group select:focus { border-color: var(--accent); }
 
  /* checkbox row */
  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
  }
  .checkbox-row input[type=checkbox] {
    width: 18px; height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
  }
 
  /* GPS field */
  .gps-row { display: flex; gap: 8px; align-items: center; }
  .gps-row input { flex: 1; }
  .gps-btn {
    flex-shrink: 0;
    padding: 10px 14px;
    background: var(--accent-lt);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-family: var(--font);
    font-size: .8rem;
    color: var(--accent);
    cursor: pointer;
    white-space: nowrap;
  }
  .gps-btn:active { background: var(--accent); color: #fff; }
 
  /* buttons */
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    padding: 12px 20px;
    font-family: var(--font);
    font-size: .8rem;
    letter-spacing: .07em;
    text-transform: uppercase;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn:active { opacity: .75; }
  .btn-primary { background: var(--accent); color: #fff; flex: 1; }
  .btn-export  { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
  .btn-clear   { background: var(--bg); border: 1px solid var(--danger);  color: var(--danger); }
 
  /* ── NODE SECTION ─────────────────────────────────── */
  .node-section {
    border: 1.5px solid var(--node-border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 14px;
    background: var(--node-bg);
  }
  .node-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .node-header h3 {
    font-size: .72rem;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--node-border);
  }
  .node-count {
    font-size: .7rem;
    color: var(--muted);
    font-style: italic;
  }
  .node-list { margin-bottom: 10px; }
  .node-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: .82rem;
    line-height: 1.5;
  }
  .node-item-text { flex: 1; color: var(--text); }
  .node-item-text strong { color: var(--muted); font-weight: normal; }
  .node-remove {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 1rem;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    opacity: .7;
  }
  .node-remove:hover { opacity: 1; }
  .node-subform {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 12px 8px;
  }
  .node-subform .field-group { margin-bottom: 10px; }
  .node-subform .field-group label { color: var(--muted); }
  .node-subform .field-group input,
  .node-subform .field-group select {
    background: var(--node-bg);
    font-size: .88rem;
    padding: 8px 10px;
  }
  .node-add-btn {
    margin-top: 4px;
    padding: 8px 16px;
    font-family: var(--font);
    font-size: .75rem;
    letter-spacing: .07em;
    text-transform: uppercase;
    background: var(--node-border);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .node-add-btn:active { opacity: .75; }
  .node-hint {
    font-size: .72rem;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }
  .node-branch {
    border-left: 2px solid var(--node-border);
    padding-left: 10px;
    margin: 8px 0;
  }
 
  /* ── ENTRIES TABLE ────────────────────────────────── */
  .entries-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .entries-card h2 {
    font-size: .75rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .entries-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  th {
    text-align: left;
    padding: 8px 12px;
    background: var(--bg);
    color: var(--muted);
    font-size: .7rem;
    letter-spacing: .07em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  td {
    padding: 9px 12px;
    border-top: 1px solid var(--border);
    vertical-align: top;
    max-width: 160px;
    word-break: break-word;
  }
  tr:nth-child(even) td { background: var(--bg); }
  .empty-msg { padding: 20px 16px; color: var(--muted); font-size: .85rem; }
  .node-cell {
    font-size: .75rem;
    color: var(--node-border);
    white-space: nowrap;
  }
 
  /* photo field */
  .photo-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .photo-btn {
    flex-shrink: 0;
    padding: 10px 14px;
    background: var(--accent-lt);
    border: 1px solid var(--accent);
    border-radius: 6px;
    font-family: var(--font);
    font-size: .8rem;
    color: var(--accent);
    cursor: pointer;
    white-space: nowrap;
  }
  .photo-btn:active { background: var(--accent); color: #fff; }
  .photo-filename {
    font-size: .75rem;
    color: var(--muted);
    word-break: break-all;
  }
  .photo-preview {
    margin-top: 8px;
    max-width: 100%;
    max-height: 220px;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: block;
  }
</style>
</head>
<body>
 
<header>
  <h1>Komana / Yeşilırmak River Valley Archaeological Survey</h1>
  <span id="entry-count" style="font-size:.8rem;opacity:.8"></span>
</header>
 
<div id="tab-bar"></div>
<main id="main"></main>
 
<script>
// ═══════════════════════════════════════════════════════
//  DATA MODELS
// ═══════════════════════════════════════════════════════
const AUTHORS = ["Burcu Erciyas", "Maxime Durocher"]; // ← replace/extend with real team names
 
const MODELS = {
 
  "Survey Unit": [
    { name: "Author",                type: "dropdown", options: AUTHORS },
    { name: "Date",                   type: "datetime" },
    { name: "Entry ID",               type: "text" },
    { name: "Administrative unit",    type: "text" },
    { name: "Dimensions",             type: "text" },
    { name: "Coordinates",            type: "gps" },
    { name: "Type of landscape", type: "dropdown",
      options: ["Field", "Mountain", "Slope"] },
    { name: "Survey methodology", type: "dropdown",
      options: ["Intensive", "Extensive"] },
    { name: "Includes the transects", type: "text" },
    { name: "Units adjacent",         type: "text" },
    { name: "Type of site", type: "dropdown",
      options: [
        "Settlement Site", "Burial / Funerary Site", "Production / Industrial Site",
        "Religious / Cultic Site", "Fortified / Defensive Site",
        "Infrastructure / Civic Site", "Specialized / Ritual or Symbolic Site"
      ] },
    { name: "Historical coverage", type: "dropdown",
      options: ["to be defined"] },
    { name: "Comments / Description", type: "text" },
    { name: "Photo", type: "photo" },
  ],
 
  "Transect": [
    { name: "Author",                type: "dropdown", options: AUTHORS },
    { name: "Date",                   type: "datetime" },
    { name: "Entry ID",               type: "text" },
    { name: "Survey unit",            type: "text" },
    { name: "Dimensions",             type: "text" },
    { name: "Coordinates",            type: "gps" },
    { name: "Adjacent transects",     type: "text" },
    { name: "Type of soil", type: "dropdown",
      options: ["Sandy", "Clay", "Rocky", "Loam"] },
    { name: "Vegetation",             type: "text" },
    // ── FINDS NODE ────────────────────────────────────
    { name: "Finds", type: "node",
      hint: "Add one entry per find.",
      nodeFields: [
        { name: "Category", type: "dropdown",
          options: ["Ceramics", "Building Material", "Architectural Feature", "Epigraphic Material", "Other"],
          triggers: "Type / Subtype"
        },
        { name: "Type / Subtype", type: "dependent-dropdown", dependsOn: "Category",
          optionsByValue: {
            "Ceramics": [
              "Glazed ware", "Unglazed / Coarse ware", "Fine ware",
              "Amphora", "Pithos / Storage jar", "Cooking ware",
              "Table ware", "Tile / Architectural ceramic"
            ],
            "Building Material": [
              "Water pipe", "Roof tile", "Brick",
              "Cut stone", "Rubble / Fieldstone",
              "Mortar", "Plaster", "Marble", "Terracotta"
            ],
            "Architectural Feature": [
              "Column", "Capital", "Wall (standing)", "Pavement / Floor",
              "Arch / Vault", "Doorway / Threshold", "Window / Niche",
              "Mosaic", "Fresco / Wall painting", "Foundation", "Posthole"
            ],
            "Epigraphic Material": [
              "Funerary inscription", "Building inscription",
              "Votive inscription", "Honorary inscription",
              "Boundary marker", "Graffiti", "Fragment (unidentified)"
            ],
            "Other": [
              "Coin", "Metal"
            ]
          }
        },
        { name: "Collected?",  type: "dropdown", options: ["Yes", "No"] },
        { name: "Diagnostic?", type: "dropdown", options: ["Yes", "No"] },
        { name: "ID Number",   type: "text" },
        { name: "Dimensions",  type: "text" },
        { name: "Notes",       type: "text" },
        { name: "Photo",       type: "photo" },
      ]
    },
    // ─────────────────────────────────────────────────
 
    // ── ARCHITECTURE & EPIGRAPHY NODE ─────────────────
    // Separate from Finds. Pick a category, get that type's full sub-form.
    { name: "Architecture & Epigraphy", type: "node",
      hint: "Add one entry per architectural feature or inscription. Choose a category to see its full form.",
      nodeFields: [
        { name: "Category", type: "dropdown",
          options: ["Architectural Feature", "Epigraphic Material"],
          triggers: "Details"
        },
        { name: "ID Number", type: "text" },
        { name: "Details", type: "branch", dependsOn: "Category",
          branches: {
            "Architectural Feature": [
              { name: "Type", type: "dropdown", options: [
                  "Column", "Capital", "Wall (standing)", "Pavement / Floor",
                  "Arch / Vault", "Doorway / Threshold", "Window / Niche",
                  "Mosaic", "Fresco / Wall painting", "Foundation", "Posthole"
              ]},
              { name: "Dimensions", type: "text" },
              { name: "Materials", type: "text" },
              { name: "Epigraphy?", type: "checkbox" },
              { name: "Observations", type: "text" },
              { name: "Photo", type: "photo" },
            ],
            "Epigraphic Material": [
              { name: "Type", type: "dropdown", options: [
                  "Funerary inscription", "Building inscription", "Votive inscription",
                  "Honorary inscription", "Boundary marker", "Graffiti",
                  "Fragment (unidentified)"
              ]},
              { name: "Language of the inscription", type: "dropdown", options: [
                  "Turkish", "Greek (Ancient, Koine, Byzantine)", "Latin", "Phrygian", "Armenian (Classical)",
                  "Thracian / Dacian (fragmentary)", "Phoenician / Punic", "Aramaic", "Hebrew (Ancient / Biblical)",
                  "Arabic (Early Islamic, Kufic)", "Hittite", "Luwian / Hieroglyphic Luwian",
                  "Lycian / Carian / Pisidian", "Urartian", "Georgian (Old Asomtavruli)", "Old Persian (Cuneiform)",
                  "Elamite", "Sumerian", "Etruscan"
              ]},
              { name: "Writing Surface", type: "dropdown", options: [
                  "marble", "limestone", "basalt / andesite", "sandstone", "stone",
                  "bronze", "lead", "gold / silver", "clay", "ceramics", "terracotta",
                  "wood / wax", "papyrus / parchment", "composite"
              ]},
              { name: "Shape", type: "dropdown", options: [
                  "Rectangular / Square", "Circular / Disk-shaped", "Oval / Elliptical", "Triangular",
                  "Polygonal / Multisided", "Globular (amphora, pithos)", "Conical (cups / small jars)",
                  "Biconical", "Carinated (sharp-angled body)", "Columnar / Pillar-like",
                  "Slab-like (flat plates, plaques)", "Domed / Vaulted", "Zoomorphic (animal-shaped)",
                  "Anthropomorphic (human-shaped)", "Symbolic (cross, star, rosette)"
              ]},
              { name: "Dimensions", type: "text" },
              { name: "Materials", type: "text" },
              { name: "Techniques", type: "dropdown", options: [
                  "Relief carving (bas-relief, high-relief)", "Incised carving (linear engravings)",
                  "Point chiseling / Pick dressing", "Polished finishing / Surface smoothing",
                  "Rock-cut carving (architectural or inscriptions)", "Whittling / Linear carving",
                  "Chip carving (geometric patterns)", "Engraving (fine incised lines)",
                  "Punch-dot or Stipple engraving", "Scrimshaw-like fine carving",
                  "Openwork / Pierced carving", "Incised decoration (pre-firing)",
                  "Stamp-impressed decoration", "Barbotine / Applied relief decoration",
                  "Inlayed carving (stone or metal inlays)"
              ]},
              { name: "Observations", type: "text" },
              { name: "Photo", type: "photo" },
            ],
          }
        },
      ]
    },
    // ─────────────────────────────────────────────────
 
    { name: "Natural features", type: "dropdown",
      options: ["Uphill", "Flat", "Downhill"] },
    { name: "Description, observations", type: "text" },
    { name: "Photo", type: "photo" },
  ],
};
 
 
// ═══════════════════════════════════════════════════════
//  NODE STATE  — tracks pending node items per form
// ═══════════════════════════════════════════════════════
const pendingNodes = {};
 
function nodeKey(modelName, fieldName) { return `${modelName}::${fieldName}`; }
function getNodeItems(m, f) { return pendingNodes[nodeKey(m, f)] || []; }
function setNodeItems(m, f, v) { pendingNodes[nodeKey(m, f)] = v; }
 
 
// ═══════════════════════════════════════════════════════
//  PHOTO STATE  — tracks pending photo filename per field
// ═══════════════════════════════════════════════════════
const pendingPhotos = {};
 
function photoKey(modelName, fieldIndex) { return `${modelName}::${fieldIndex}`; }
 
function onPhotoSelected(modelName, fieldIndex, inputEl) {
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
 
  // iOS Safari often hands back a generic name like "image.jpg" for camera
  // captures, so we build our own descriptive name instead of trusting file.name.
  const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop() : 'jpg';
  const stamp = new Date().toISOString().replace(/[:.]/g, '-');
  const generatedName = `${slugify(modelName)}_${stamp}.${ext}`;
 
  pendingPhotos[photoKey(modelName, fieldIndex)] = generatedName;
 
  const filenameEl = document.getElementById(`photo-filename-${slugify(modelName)}-${fieldIndex}`);
  if (filenameEl) filenameEl.textContent = generatedName;
 
  const previewEl = document.getElementById(`photo-preview-${slugify(modelName)}-${fieldIndex}`);
  if (previewEl) {
    const reader = new FileReader();
    reader.onload = e => {
      previewEl.src = e.target.result;
      previewEl.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
 
  const btn = document.getElementById(`photo-btn-${slugify(modelName)}-${fieldIndex}`);
  if (btn) btn.textContent = '📷 Retake photo';
 
  // trigger a download of the photo, renamed, so it's saved alongside the CSV export
  const a = document.createElement('a');
  a.href = URL.createObjectURL(file);
  a.download = generatedName;
  a.click();
  URL.revokeObjectURL(a.href);
}
 
 
// ── PHOTO HANDLER FOR NODE SUB-FORMS (Finds, Architecture & Epigraphy items) ──
// Each node row gets its own filename slot, keyed by modelName + fieldIndex + nodeFieldIndex.
function nodePhotoKey(modelName, fieldIndex, si) { return `${modelName}::${fieldIndex}::${si}`; }
const pendingNodePhotos = {};
 
function onNodePhotoSelected(modelName, fieldIndex, si, inputEl) {
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
 
  const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop() : 'jpg';
  const stamp = new Date().toISOString().replace(/[:.]/g, '-');
  const field = MODELS[modelName][fieldIndex];
  const generatedName = `${slugify(modelName)}_${slugify(field.name)}_${stamp}.${ext}`;
 
  pendingNodePhotos[nodePhotoKey(modelName, fieldIndex, si)] = generatedName;
 
  const id = `node-field-${slugify(modelName)}-${fieldIndex}-${si}`;
  const filenameEl = document.getElementById(`${id}-filename`);
  if (filenameEl) filenameEl.textContent = generatedName;
 
  const previewEl = document.getElementById(`${id}-preview`);
  if (previewEl) {
    const reader = new FileReader();
    reader.onload = e => {
      previewEl.src = e.target.result;
      previewEl.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
 
  const btn = document.getElementById(`${id}-btn`);
  if (btn) btn.textContent = '📷 Retake photo';
 
  const a = document.createElement('a');
  a.href = URL.createObjectURL(file);
  a.download = generatedName;
  a.click();
  URL.revokeObjectURL(a.href);
}
 
function resetNodePhoto(modelName, fieldIndex, si) {
  delete pendingNodePhotos[nodePhotoKey(modelName, fieldIndex, si)];
  const id = `node-field-${slugify(modelName)}-${fieldIndex}-${si}`;
  const fileInput = document.getElementById(id);
  if (fileInput) fileInput.value = '';
  const filenameEl = document.getElementById(`${id}-filename`);
  if (filenameEl) filenameEl.textContent = '';
  const previewEl = document.getElementById(`${id}-preview`);
  if (previewEl) { previewEl.style.display = 'none'; previewEl.src = ''; }
  const btn = document.getElementById(`${id}-btn`);
  if (btn) btn.textContent = '📷 Take a photo';
}
 
 
// ── PHOTO HANDLER FOR BRANCH SUB-FIELDS (Architecture & Epigraphy details) ──
const pendingBranchPhotos = {};
function branchPhotoKey(modelName, fieldIndex, branchValue, bi) {
  return `${modelName}::${fieldIndex}::${branchValue}::${bi}`;
}
 
function onBranchPhotoSelected(modelName, fieldIndex, branchValue, bi, inputEl) {
  const file = inputEl.files && inputEl.files[0];
  if (!file) return;
 
  const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop() : 'jpg';
  const stamp = new Date().toISOString().replace(/[:.]/g, '-');
  const generatedName = `${slugify(modelName)}_${slugify(branchValue)}_${stamp}.${ext}`;
 
  pendingBranchPhotos[branchPhotoKey(modelName, fieldIndex, branchValue, bi)] = generatedName;
 
  const id = `node-branch-field-${slugify(modelName)}-${fieldIndex}-${slugify(branchValue)}-${bi}`;
  const filenameEl = document.getElementById(`${id}-filename`);
  if (filenameEl) filenameEl.textContent = generatedName;
 
  const previewEl = document.getElementById(`${id}-preview`);
  if (previewEl) {
    const reader = new FileReader();
    reader.onload = e => {
      previewEl.src = e.target.result;
      previewEl.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
 
  const btn = document.getElementById(`${id}-btn`);
  if (btn) btn.textContent = '📷 Retake photo';
 
  const a = document.createElement('a');
  a.href = URL.createObjectURL(file);
  a.download = generatedName;
  a.click();
  URL.revokeObjectURL(a.href);
}
 
 
 
// ═══════════════════════════════════════════════════════
//  SLUGIFY — safe IDs from model names (avoids spaces in DOM ids,
//  which mobile Safari handles inconsistently)
// ═══════════════════════════════════════════════════════
function slugify(name) {
  return String(name).replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');
}
 
 
// ═══════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════
const storageKey = name => `fieldform_${name}`;
 
function loadEntries(modelName) {
  try { return JSON.parse(localStorage.getItem(storageKey(modelName))) || []; }
  catch { return []; }
}
function saveEntries(modelName, entries) {
  localStorage.setItem(storageKey(modelName), JSON.stringify(entries));
}
 
 
// ═══════════════════════════════════════════════════════
//  BUILD UI
// ═══════════════════════════════════════════════════════
const tabBar = document.getElementById('tab-bar');
const mainEl = document.getElementById('main');
const models = Object.keys(MODELS);
let activeTab = models[0];
 
models.forEach(name => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (name === activeTab ? ' active' : '');
  btn.textContent = name;
  btn.onclick = () => switchTab(name);
  tabBar.appendChild(btn);
 
  const panel = document.createElement('div');
  panel.className = 'tab-panel' + (name === activeTab ? ' active' : '');
  panel.id = `panel-${slugify(name)}`;
  panel.innerHTML = buildPanel(name);
  mainEl.appendChild(panel);
 
  // wire GPS buttons
  MODELS[name].forEach((field, i) => {
    if (field.type === 'gps') {
      document.getElementById(`gps-btn-${slugify(name)}-${i}`)
        ?.addEventListener('click', () => getGPS(name, i));
    }
  });
 
  renderTable(name);
});
 
updateCount();
 
function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', models[i] === name));
  document.querySelectorAll('.tab-panel').forEach(p =>
    p.classList.toggle('active', p.id === `panel-${slugify(name)}`));
  updateCount();
}
 
 
// ── BUILD PANEL ───────────────────────────────────────
function buildPanel(name) {
  const fieldsHtml = MODELS[name].map((f, i) => buildField(f, name, i)).join('');
  return `
    <div class="form-card">
      <h2>New entry — ${name}</h2>
      <div id="fields-${slugify(name)}">${fieldsHtml}</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="submitEntry('${name}')">＋ Add entry</button>
        <button class="btn btn-export"  onclick="exportCSV('${name}')">↓ CSV</button>
        <button class="btn btn-clear"   onclick="clearEntries('${name}')">✕</button>
      </div>
    </div>
    <div class="entries-card">
      <h2>Entries</h2>
      <div class="entries-wrap"><div id="table-${name}"></div></div>
    </div>`;
}
 
 
// ── FIELD BUILDER ─────────────────────────────────────
function buildField(field, modelName, i) {
  const id = `field-${slugify(modelName)}-${i}`;
  const label = `<label for="${id}">${field.name}</label>`;
 
  switch (field.type) {
    case 'text':
      return `<div class="field-group">${label}<input id="${id}" type="text" placeholder="${field.name}"></div>`;
    case 'number':
      return `<div class="field-group">${label}<input id="${id}" type="number" placeholder="0"></div>`;
    case 'datetime':
      return `<div class="field-group">${label}<input id="${id}" type="datetime-local"></div>`;
    case 'year':
      return `<div class="field-group">${label}<input id="${id}" type="number" min="1000" max="2100" placeholder="YYYY"></div>`;
    case 'url':
      return `<div class="field-group">${label}<input id="${id}" type="url" placeholder="https://"></div>`;
    case 'dropdown': {
      const opts = field.options.map(o => `<option value="${o}">${o}</option>`).join('');
      return `<div class="field-group">${label}<select id="${id}"><option value="">— select —</option>${opts}</select></div>`;
    }
    case 'checkbox':
      return `<div class="field-group"><label>${field.name}</label>
        <label class="checkbox-row"><input id="${id}" type="checkbox"> ${field.name}</label></div>`;
    case 'gps':
      return `<div class="field-group">${label}
        <div class="gps-row">
          <input id="${id}-lat" type="text" placeholder="Latitude"  readonly>
          <input id="${id}-lon" type="text" placeholder="Longitude" readonly>
          <button class="gps-btn" id="gps-btn-${modelName}-${i}">📍 Get</button>
        </div></div>`;
    case 'node':
      return buildNodeField(field, modelName, i);
    case 'photo':
      return `<div class="field-group">${label}
        <div class="photo-row">
          <input id="${id}" type="file" accept="image/*" capture="environment" style="display:none"
            onchange="onPhotoSelected('${modelName}', ${i}, this)">
          <button type="button" class="photo-btn" id="photo-btn-${modelName}-${i}"
            onclick="document.getElementById('${id}').click()">📷 Take a photo</button>
          <span class="photo-filename" id="photo-filename-${modelName}-${i}"></span>
        </div>
        <img class="photo-preview" id="photo-preview-${modelName}-${i}" style="display:none">
      </div>`;
    default:
      return `<div class="field-group">${label}<input id="${id}" type="text"></div>`;
  }
}
 
 
// ── NODE FIELD BUILDER ────────────────────────────────
function buildNodeField(field, modelName, fieldIndex) {
  setNodeItems(modelName, field.name, []);
 
  const subHtml = field.nodeFields.map((sf, si) =>
    buildSubField(sf, modelName, fieldIndex, si)
  ).join('');
 
  const hint = field.hint
    ? `<p class="node-hint">${field.hint}</p>`
    : '';
 
  return `
    <div class="node-section">
      <div class="node-header">
        <h3>${field.name}</h3>
        <span class="node-count" id="node-count-${modelName}-${fieldIndex}">none added</span>
      </div>
      <div class="node-list" id="node-list-${modelName}-${fieldIndex}"></div>
      <div class="node-subform">
        ${subHtml}
        <button class="node-add-btn" onclick="addNodeItem('${modelName}', ${fieldIndex})">＋ Add</button>
      </div>
      ${hint}
    </div>`;
}
 
function buildSubField(sf, modelName, fieldIndex, si) {
  const id  = `node-field-${slugify(modelName)}-${fieldIndex}-${si}`;
  const lbl = `<label for="${id}">${sf.name}</label>`;
 
  if (sf.type === 'dropdown') {
    const onChange = sf.triggers
      ? ` onchange="onNodeFieldChange('${modelName}', ${fieldIndex}, ${si}, this.value)"`
      : '';
    const opts = sf.options.map(o => `<option value="${o}">${o}</option>`).join('');
    return `<div class="field-group">${lbl}<select id="${id}"${onChange}><option value="">— select —</option>${opts}</select></div>`;
  }
  if (sf.type === 'dependent-dropdown') {
    return `<div class="field-group">${lbl}
      <select id="${id}" disabled style="opacity:.5">
        <option value="">— select a category first —</option>
      </select></div>`;
  }
  if (sf.type === 'branch') {
    return buildBranchBlock(sf, modelName, fieldIndex, si);
  }
  if (sf.type === 'number') return `<div class="field-group">${lbl}<input id="${id}" type="number" placeholder="0"></div>`;
  if (sf.type === 'year')   return `<div class="field-group">${lbl}<input id="${id}" type="number" min="1000" max="2100" placeholder="YYYY"></div>`;
  if (sf.type === 'url')    return `<div class="field-group">${lbl}<input id="${id}" type="url" placeholder="https://"></div>`;
  if (sf.type === 'checkbox') {
    return `<div class="field-group"><label>${sf.name}</label>
      <label class="checkbox-row"><input id="${id}" type="checkbox"> ${sf.name}</label></div>`;
  }
  if (sf.type === 'photo') {
    return `<div class="field-group">${lbl}
      <div class="photo-row">
        <input id="${id}" type="file" accept="image/*" capture="environment" style="display:none"
          onchange="onNodePhotoSelected('${modelName}', ${fieldIndex}, ${si}, this)">
        <button type="button" class="photo-btn" id="${id}-btn"
          onclick="document.getElementById('${id}').click()">📷 Take a photo</button>
        <span class="photo-filename" id="${id}-filename"></span>
      </div>
      <img class="photo-preview" id="${id}-preview" style="display:none">
    </div>`;
  }
  return `<div class="field-group">${lbl}<input id="${id}" type="text" placeholder="${sf.name}"></div>`;
}
 
// ── BRANCH SUB-FIELDS (conditional full field sets inside a node) ──
// A branch field shows an entirely different set of fields depending on
// the value of a trigger dropdown elsewhere in the same node (e.g. pick
// "Architectural Feature" vs "Epigraphic Material" → see that type's fields).
function buildBranchBlock(branchField, modelName, fieldIndex, si) {
  const blocksHtml = Object.entries(branchField.branches).map(([branchValue, branchFields]) => {
    const fieldsHtml = branchFields.map((bf, bi) =>
      buildBranchSubField(bf, modelName, fieldIndex, si, branchValue, bi)
    ).join('');
    return `<div class="node-branch" id="node-branch-${slugify(modelName)}-${fieldIndex}-${si}-${slugify(branchValue)}" style="display:none">${fieldsHtml}</div>`;
  }).join('');
  return blocksHtml;
}
 
function buildBranchSubField(bf, modelName, fieldIndex, si, branchValue, bi) {
  const id  = `node-branch-field-${slugify(modelName)}-${fieldIndex}-${si}-${slugify(branchValue)}-${bi}`;
  const lbl = `<label for="${id}">${bf.name}</label>`;
 
  if (bf.type === 'dropdown') {
    const opts = bf.options.map(o => `<option value="${o}">${o}</option>`).join('');
    return `<div class="field-group">${lbl}<select id="${id}"><option value="">— select —</option>${opts}</select></div>`;
  }
  if (bf.type === 'checkbox') {
    return `<div class="field-group"><label>${bf.name}</label>
      <label class="checkbox-row"><input id="${id}" type="checkbox"> ${bf.name}</label></div>`;
  }
  if (bf.type === 'photo') {
    return `<div class="field-group">${lbl}
      <div class="photo-row">
        <input id="${id}" type="file" accept="image/*" capture="environment" style="display:none"
          onchange="onBranchPhotoSelected('${modelName}', ${fieldIndex}, '${branchValue}', ${bi}, this)">
        <button type="button" class="photo-btn" id="${id}-btn"
          onclick="document.getElementById('${id}').click()">📷 Take a photo</button>
        <span class="photo-filename" id="${id}-filename"></span>
      </div>
      <img class="photo-preview" id="${id}-preview" style="display:none">
    </div>`;
  }
  if (bf.type === 'number') return `<div class="field-group">${lbl}<input id="${id}" type="number" placeholder="0"></div>`;
  return `<div class="field-group">${lbl}<input id="${id}" type="text" placeholder="${bf.name}"></div>`;
}
 
// ── CASCADING DROPDOWN HANDLER ────────────────────────
function onNodeFieldChange(modelName, fieldIndex, triggerSubIndex, value) {
  const field = MODELS[modelName][fieldIndex];
  const triggerField = field.nodeFields[triggerSubIndex];
 
  field.nodeFields.forEach((sf, si) => {
    if (sf.type === 'dependent-dropdown' && sf.dependsOn === triggerField.name) {
      const el = document.getElementById(`node-field-${slugify(modelName)}-${fieldIndex}-${si}`);
      if (!el) return;
      const opts = (sf.optionsByValue[value] || []);
      el.innerHTML = opts.length
        ? `<option value="">— select —</option>` + opts.map(o => `<option value="${o}">${o}</option>`).join('')
        : `<option value="">— select a category first —</option>`;
      el.disabled = !opts.length;
      el.style.opacity = opts.length ? '1' : '.5';
    }
 
    if (sf.type === 'branch' && sf.dependsOn === triggerField.name) {
      Object.keys(sf.branches).forEach(branchValue => {
        const blockEl = document.getElementById(
          `node-branch-${slugify(modelName)}-${fieldIndex}-${si}-${slugify(branchValue)}`
        );
        if (blockEl) blockEl.style.display = (branchValue === value) ? 'block' : 'none';
      });
    }
  });
}
 
 
// ── ADD / REMOVE NODE ITEMS ───────────────────────────
function addNodeItem(modelName, fieldIndex) {
  const field = MODELS[modelName][fieldIndex];
  if (!field || field.type !== 'node') return;
 
  const item = {};
 
  field.nodeFields.forEach((sf, si) => {
    if (sf.type === 'branch') {
      // find which branch is currently visible and read its fields
      Object.entries(sf.branches).forEach(([branchValue, branchFields]) => {
        const blockEl = document.getElementById(
          `node-branch-${slugify(modelName)}-${fieldIndex}-${si}-${slugify(branchValue)}`
        );
        const isVisible = blockEl && blockEl.style.display !== 'none';
        branchFields.forEach((bf, bi) => {
          const id = `node-branch-field-${slugify(modelName)}-${fieldIndex}-${si}-${slugify(branchValue)}-${bi}`;
          if (bf.type === 'photo') {
            const key = branchPhotoKey(modelName, fieldIndex, branchValue, bi);
            if (isVisible) {
              item[bf.name] = pendingBranchPhotos[key] || '';
            }
            delete pendingBranchPhotos[key];
            const fileInput = document.getElementById(id);
            if (fileInput) fileInput.value = '';
            const filenameEl = document.getElementById(`${id}-filename`);
            if (filenameEl) filenameEl.textContent = '';
            const previewEl = document.getElementById(`${id}-preview`);
            if (previewEl) { previewEl.style.display = 'none'; previewEl.src = ''; }
            const btn = document.getElementById(`${id}-btn`);
            if (btn) btn.textContent = '📷 Take a photo';
            return;
          }
          const el = document.getElementById(id);
          if (!el) return;
          if (isVisible) {
            item[bf.name] = bf.type === 'checkbox' ? (el.checked ? 'yes' : 'no') : el.value.trim();
          }
          if (bf.type === 'checkbox') el.checked = false; else el.value = '';
        });
      });
      return;
    }
 
    if (sf.type === 'photo') {
      const key = nodePhotoKey(modelName, fieldIndex, si);
      item[sf.name] = pendingNodePhotos[key] || '';
      resetNodePhoto(modelName, fieldIndex, si);
      return;
    }
 
    const el = document.getElementById(`node-field-${slugify(modelName)}-${fieldIndex}-${si}`);
    item[sf.name] = el ? el.value.trim() : '';
    if (el) el.value = '';
  });
 
  if (Object.values(item).every(v => !v)) return; // nothing filled
 
  const items = getNodeItems(modelName, field.name);
  items.push(item);
  setNodeItems(modelName, field.name, items);
  renderNodeList(modelName, fieldIndex, field);
 
  // hide all branch blocks again after submit
  field.nodeFields.forEach((sf, si) => {
    if (sf.type !== 'branch') return;
    Object.keys(sf.branches).forEach(branchValue => {
      const blockEl = document.getElementById(
        `node-branch-${slugify(modelName)}-${fieldIndex}-${si}-${slugify(branchValue)}`
      );
      if (blockEl) blockEl.style.display = 'none';
    });
  });
}
 
function removeNodeItem(modelName, fieldIndex, idx) {
  const field = MODELS[modelName][fieldIndex];
  const items = getNodeItems(modelName, field.name);
  items.splice(idx, 1);
  setNodeItems(modelName, field.name, items);
  renderNodeList(modelName, fieldIndex, field);
}
 
function renderNodeList(modelName, fieldIndex, field) {
  const items   = getNodeItems(modelName, field.name);
  const listEl  = document.getElementById(`node-list-${slugify(modelName)}-${fieldIndex}`);
  const countEl = document.getElementById(`node-count-${slugify(modelName)}-${fieldIndex}`);
 
  if (countEl) countEl.textContent = items.length ? `${items.length} added` : 'none added';
  if (!listEl) return;
 
  listEl.innerHTML = items.map((item, idx) => {
    const summary = Object.entries(item)
      .filter(([, v]) => v)
      .map(([k, v]) => `<strong>${k}:</strong> ${v}`)
      .join('  ·  ');
    return `<div class="node-item">
      <span class="node-item-text">${summary || '(empty)'}</span>
      <button class="node-remove" title="Remove" onclick="removeNodeItem('${modelName}', ${fieldIndex}, ${idx})">✕</button>
    </div>`;
  }).join('');
}
 
 
// ── GPS ───────────────────────────────────────────────
function getGPS(modelName, fieldIndex) {
  const id  = `field-${slugify(modelName)}-${fieldIndex}`;
  const btn = document.getElementById(`gps-btn-${slugify(modelName)}-${fieldIndex}`);
  btn.textContent = '…';
  navigator.geolocation.getCurrentPosition(
    pos => {
      document.getElementById(`${id}-lat`).value = pos.coords.latitude.toFixed(6);
      document.getElementById(`${id}-lon`).value = pos.coords.longitude.toFixed(6);
      btn.textContent = '✓';
    },
    err => { alert('GPS error: ' + err.message); btn.textContent = '📍 Get'; },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}
 
 
// ── SUBMIT ────────────────────────────────────────────
function submitEntry(modelName) {
  const fields = MODELS[modelName];
  const entry  = { _timestamp: new Date().toISOString() };
 
  fields.forEach((field, i) => {
    const id = `field-${slugify(modelName)}-${i}`;
    if (field.type === 'node') {
      entry[field.name] = getNodeItems(modelName, field.name);
    } else if (field.type === 'photo') {
      entry[field.name] = pendingPhotos[photoKey(modelName, i)] || '';
    } else if (field.type === 'checkbox') {
      entry[field.name] = document.getElementById(id).checked ? 'yes' : 'no';
    } else if (field.type === 'gps') {
      const lat = document.getElementById(`${id}-lat`).value;
      const lon = document.getElementById(`${id}-lon`).value;
      entry[field.name] = lat && lon ? `${lat},${lon}` : '';
    } else {
      entry[field.name] = document.getElementById(id).value.trim();
    }
  });
 
  const entries = loadEntries(modelName);
  entries.push(entry);
  saveEntries(modelName, entries);
  resetForm(modelName);
  renderTable(modelName);
  updateCount();
}
 
 
// ── RESET ─────────────────────────────────────────────
function resetForm(modelName) {
  MODELS[modelName].forEach((field, i) => {
    const id = `field-${slugify(modelName)}-${i}`;
    if (field.type === 'node') {
      setNodeItems(modelName, field.name, []);
      renderNodeList(modelName, i, field);
      field.nodeFields.forEach((sf, si) => {
        if (sf.type === 'branch') {
          Object.entries(sf.branches).forEach(([branchValue, branchFields]) => {
            const blockEl = document.getElementById(
              `node-branch-${slugify(modelName)}-${i}-${si}-${slugify(branchValue)}`
            );
            if (blockEl) blockEl.style.display = 'none';
            branchFields.forEach((bf, bi) => {
              const bid = `node-branch-field-${slugify(modelName)}-${i}-${si}-${slugify(branchValue)}-${bi}`;
              if (bf.type === 'photo') {
                delete pendingBranchPhotos[branchPhotoKey(modelName, i, branchValue, bi)];
                const fileInput = document.getElementById(bid);
                if (fileInput) fileInput.value = '';
                const filenameEl = document.getElementById(`${bid}-filename`);
                if (filenameEl) filenameEl.textContent = '';
                const previewEl = document.getElementById(`${bid}-preview`);
                if (previewEl) { previewEl.style.display = 'none'; previewEl.src = ''; }
                const btn = document.getElementById(`${bid}-btn`);
                if (btn) btn.textContent = '📷 Take a photo';
                return;
              }
              const bEl = document.getElementById(bid);
              if (!bEl) return;
              if (bf.type === 'checkbox') bEl.checked = false; else bEl.value = '';
            });
          });
          return;
        }
        if (sf.type === 'photo') {
          resetNodePhoto(modelName, i, si);
          return;
        }
        const el = document.getElementById(`node-field-${slugify(modelName)}-${i}-${si}`);
        if (!el) return;
        if (sf.type === 'dependent-dropdown') {
          el.innerHTML = '<option value="">— select a category first —</option>';
          el.disabled = true;
          el.style.opacity = '.5';
        } else {
          el.value = '';
        }
      });
    } else if (field.type === 'photo') {
      delete pendingPhotos[photoKey(modelName, i)];
      const fileInput = document.getElementById(id);
      if (fileInput) fileInput.value = '';
      const filenameEl = document.getElementById(`photo-filename-${slugify(modelName)}-${i}`);
      if (filenameEl) filenameEl.textContent = '';
      const previewEl = document.getElementById(`photo-preview-${slugify(modelName)}-${i}`);
      if (previewEl) { previewEl.style.display = 'none'; previewEl.src = ''; }
      const btn = document.getElementById(`photo-btn-${slugify(modelName)}-${i}`);
      if (btn) btn.textContent = '📷 Take a photo';
    } else if (field.type === 'checkbox') {
      document.getElementById(id).checked = false;
    } else if (field.type === 'gps') {
      document.getElementById(`${id}-lat`).value = '';
      document.getElementById(`${id}-lon`).value = '';
      const btn = document.getElementById(`gps-btn-${slugify(modelName)}-${i}`);
      if (btn) btn.textContent = '📍 Get';
    } else {
      document.getElementById(id).value = '';
    }
  });
}
 
 
// ── RENDER TABLE ──────────────────────────────────────
function renderTable(modelName) {
  const entries   = loadEntries(modelName);
  const container = document.getElementById(`table-${slugify(modelName)}`);
  if (!container) return;
 
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty-msg">No entries yet.</div>';
    return;
  }
 
  const headers  = ['_timestamp', ...MODELS[modelName].map(f => f.name)];
  const nodeFields = new Set(MODELS[modelName].filter(f => f.type === 'node').map(f => f.name));
  const headerRow = headers.map(h => `<th>${h}</th>`).join('');
 
  const rows = entries.map(e =>
    `<tr>${headers.map(h => {
      const v = e[h];
      if (nodeFields.has(h)) {
        const n = Array.isArray(v) ? v.length : 0;
        return `<td class="node-cell">${n ? `◈ ${n} item${n > 1 ? 's' : ''}` : '—'}</td>`;
      }
      return `<td>${v ?? ''}</td>`;
    }).join('')}</tr>`
  ).join('');
 
  container.innerHTML = `<table><thead><tr>${headerRow}</tr></thead><tbody>${rows}</tbody></table>`;
}
 
 
// ── EXPORT CSV ────────────────────────────────────────
function exportCSV(modelName) {
  const entries = loadEntries(modelName);
  if (entries.length === 0) { alert('No entries to export.'); return; }
 
  const headers  = ['_timestamp', ...MODELS[modelName].map(f => f.name)];
  const escape   = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
  const cellVal  = (h, e) => {
    const v = e[h];
    return Array.isArray(v) ? escape(JSON.stringify(v)) : escape(v);
  };
  const lines = [
    headers.map(escape).join(','),
    ...entries.map(e => headers.map(h => cellVal(h, e)).join(','))
  ];
 
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${modelName.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
 
 
// ── CLEAR ─────────────────────────────────────────────
function clearEntries(modelName) {
  if (!confirm(`Delete ALL entries for "${modelName}"? This cannot be undone.`)) return;
  localStorage.removeItem(storageKey(modelName));
  renderTable(modelName);
  updateCount();
}
 
 
// ── HEADER COUNT ──────────────────────────────────────
function updateCount() {
  const entries = loadEntries(activeTab);
  document.getElementById('entry-count').textContent =
    entries.length ? `${entries.length} entr${entries.length > 1 ? 'ies' : 'y'}` : '';
}
</script>
